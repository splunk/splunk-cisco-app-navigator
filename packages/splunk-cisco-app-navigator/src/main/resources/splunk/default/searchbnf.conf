# searchbnf.conf — Search syntax for Splunk Cisco App Navigator

[downloadsplunkbasecsv-command]
syntax       = downloadsplunkbasecsv (input_csv=<string>) (output_csv=<string>)?
shortdesc    = Download Splunkbase apps CSV from S3
description  = Downloads a CSV file from the IS4S S3 bucket and saves it to the app's lookups folder. Handles gzip compression/decompression automatically. Overwrites existing files without warning.
example1     = | downloadsplunkbasecsv input_csv=splunkbase_assets/splunkbase_apps.csv.gz output_csv=scan_splunkbase_apps.csv.gz
comment1     = Download the Splunkbase apps catalog and save as gzipped CSV
example2     = | downloadsplunkbasecsv input_csv=splunkbase_assets/splunkbase_apps.csv.gz output_csv=scan_splunkbase_apps.csv
comment2     = Download and decompress to plain CSV for inputlookup
comment      = The input_csv path is relative to the S3 bucket root (https://is4s.s3.amazonaws.com/). Output is written to $SPLUNK_HOME/etc/apps/splunk-cisco-app-navigator/lookups/.
maintainer   = Splunk Cisco App Navigator
usage        = public
