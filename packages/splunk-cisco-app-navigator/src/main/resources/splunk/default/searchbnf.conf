# searchbnf.conf — Search syntax for Splunk Cisco App Navigator

[synclookup-command]
syntax       = synclookup (input_csv=<string>) (output_csv=<string>)?
shortdesc    = Sync Splunkbase lookup from S3
description  = Downloads a CSV file from the IS4S S3 bucket and saves it to the app's lookups folder. Handles gzip compression/decompression automatically. Overwrites existing files without warning.
example1     = | synclookup input_csv=splunkbase_assets/splunkbase_apps.csv.gz output_csv=scan_splunkbase_apps.csv.gz
comment1     = Download the Splunkbase apps catalog and save as gzipped CSV
example2     = | synclookup input_csv=splunkbase_assets/splunkbase_apps.csv.gz output_csv=scan_splunkbase_apps.csv
comment2     = Download and decompress to plain CSV for inputlookup
comment      = The input_csv path is relative to the S3 bucket root (https://is4s.s3.amazonaws.com/). Output is written to $SPLUNK_HOME/etc/apps/splunk-cisco-app-navigator/lookups/.
maintainer   = Splunk Cisco App Navigator
usage        = public
related      = synccatalog

[synccatalog-command]
syntax       = synccatalog (dryrun=<bool>)?
shortdesc    = Sync products.conf from S3
description  = Compares the local products.conf version stamp (format: YYYY_MM_DD_HHMM on line 1) against the S3 copy. If the S3 version is newer, downloads and replaces the local products.conf, backs up the original, and reloads the configuration. Use dryrun=true to check without applying changes.
example1     = | synccatalog dryrun=false
comment1     = Check S3 for a newer products.conf and apply if found
example2     = | synccatalog dryrun=true
comment2     = Compare versions without downloading or replacing
comment      = The products.conf file is fetched from the IS4S S3 bucket. Version stamps use the format YYYY_MM_DD_HHMM (24-hour UTC).
maintainer   = Splunk Cisco App Navigator
usage        = public
related      = synclookup
