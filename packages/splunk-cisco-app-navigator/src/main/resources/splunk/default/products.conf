# version = 2026_03_27_1651
# min_app_version = 1.0.21
# compares this against the S3 copy to decide whether an update is needed.
# Line 2: min_app_version = app release that introduced this schema.  If the
# running app is older than this, synccatalog will NOT overwrite products.conf
# (customer must upgrade the app first to get the new schema).
#
# Splunk Cisco App Navigator (SCAN) — Product Catalog Configuration
#
# Each stanza [product_id] maps to one card in the Glass Pane UI.
# Fields are documented below with a complete commented-out example.
#
# keywords — Comma-separated search terms for the Universal Finder.
#
# ──────────────────────────────────────────────────────────────────────────────
# REDUNDANT / ALIAS FIELDS (use one name per purpose to avoid drift)
# ──────────────────────────────────────────────────────────────────────────────
# addon_uid          = addon_splunkbase_uid     (Splunkbase app ID for primary TA)
# app_viz_uid        = app_viz_splunkbase_uid   (Splunkbase app ID for viz app)
# app_viz_2_uid      = app_viz_2_splunkbase_uid (Splunkbase app ID for second viz)
# The generator and UI accept both names; products.conf uses *_uid. Prefer *_uid.
#
# What to do: (1) In new or edited stanzas, use only addon_uid / app_viz_uid / app_viz_2_uid.
# (2) If you find addon_splunkbase_uid or app_viz_splunkbase_uid in a stanza, rename to the
#     *_uid form for consistency (no code change needed; generator reads both).
# (3) Do not add both names for the same value — pick one to avoid drift.
#
# ──────────────────────────────────────────────────────────────────────────────
# COMPLETE EXAMPLE STANZA (all available fields)
# ──────────────────────────────────────────────────────────────────────────────
#
# [product_id]
#
# ── Core identity ────────────────────────────────────────────────────────────
# disabled = 0                         ; 1 = vault (hidden from UI, status should be "archived")
# display_name = Cisco Widget (WGT)    ; human-readable name shown on the card
# description = A brief paragraph …   ; product description shown on hover/expand
# value_proposition = Why this exists. ; one-liner shown as subtitle on the card
# vendor = Cisco                       ; vendor name (always "Cisco" for now)
# tagline = Security App               ; short category label on the card badge
# category = security                  ; one of: security | networking | collaboration | observability
# subcategory = network_security       ; granular filter (see spec for full list of 19 subcategories)
# version = 1.0.0                      ; product catalog entry version
# date_created = 2026-02-23            ; date the catalog entry was first added (YYYY-MM-DD)
# date_updated = 2026-03-21            ; date the catalog entry was last modified (YYYY-MM-DD)
# status = active                      ; active | deprecated | retired | under_development | roadmap | archived
# support_level = cisco_supported      ; cisco_supported | splunk_supported | developer_supported | community_supported | not_supported
# is_new = true                        ; show "NEW" badge on the card (omit or false if not new)
# custom = false                       ; true = customer-created card (lives in local/products.conf)
# cisco_retired = true                 ; Cisco has retired this product (shows ribbon + Retired section)
# coverage_gap = true                  ; GTM roadmap product — no Splunk integration yet (drives "GTM Roadmap" section)
# gap_type = new_integration           ; new_integration | rebuild | enhancement (only when coverage_gap = true)
# gtm_pillar = 1                       ; GTM pillar 1-5 (only when coverage_gap = true)
# secure_networking_gtm = true         ; include in Secure Networking GTM filter
#
# ── AI ───────────────────────────────────────────────────────────────────────
# ai_enabled = true                    ; show AI-Powered badge on the card
# ai_description = Uses AI for …      ; tooltip text for the AI badge
#
# ── Enterprise Security (ES) & CIM ──────────────────────────────────────────
# es_compatible = true                 ; show ES badge — add-on maps to CIM data models
# es_cim_data_models = Authentication,Network_Traffic,Intrusion_Detection  ; CIM models the TA tags
#
# ── ESCU (Enterprise Security Content Update) ───────────────────────────────
# escu_analytic_stories = Cisco Widget Suspicious Activity   ; ESCU analytic story names
# escu_detection_count = 5             ; number of ESCU detections targeting this product
# escu_detections = Detection One,Detection Two              ; individual detection search names
#
# ── Splunk Security Essentials (SSE) — free Splunkbase app ──────────────────
# sse_content = true                   ; SSE has use cases for this product
# sse_use_cases = Use Case One,Use Case Two                  ; SSE showcase names
# sse_use_case_count = 5               ; number of SSE use cases
# sse_data_sources = VendorSpecific-cisco-duo                ; SSE data source categories
#
# ── IT Essentials Learn (ITE Learn) — free Splunkbase app ───────────────────
# ite_learn_content = true             ; ITE Learn has procedures for this product
# ite_learn_procedures = Procedure One,Procedure Two         ; ITE Learn procedure names
# ite_learn_procedure_count = 3        ; number of ITE Learn procedures
#
# ── Primary add-on (TA) ─────────────────────────────────────────────────────
# addon = CiscoSecurityCloud           ; Splunk app folder name of the main TA/add-on
# addon_label = Cisco Security Cloud   ; display label for the add-on
# addon_family = security-cloud        ; family grouping: security-cloud | cloud-security | catalyst | standalone
# addon_uid = 7404                     ; Splunkbase numeric app ID (canonical). Alias: addon_splunkbase_uid.
# addon_splunkbase_url = https://splunkbase.splunk.com/app/7404  ; Splunkbase listing URL
# addon_docs_url = https://example.com/docs                     ; documentation URL
# addon_troubleshoot_url = https://example.com/troubleshoot     ; troubleshooting guide URL
# addon_install_url = /manager/splunk-cisco-app-navigator/appsremote?…  ; Splunk Manager deep-link
#
# ── Visualization / companion app ───────────────────────────────────────────
# app_viz = cisco_widget_viz           ; folder name of a companion viz app (if any)
# app_viz_label = Cisco Widget Viz     ; display label
# app_viz_uid = 7539                   ; Splunkbase numeric app ID. Alias: app_viz_splunkbase_uid.
# app_viz_splunkbase_url = https://splunkbase.splunk.com/app/7539  ; Splunkbase listing URL
# app_viz_docs_url =                   ; documentation URL
# app_viz_troubleshoot_url =           ; troubleshooting URL
# app_viz_install_url =                ; Splunk Manager deep-link
#
# ── Second visualization app (rare) ─────────────────────────────────────────
# app_viz_2 =                          ; same fields as app_viz but for a second companion
# app_viz_2_label =
# app_viz_2_uid =                      ; Splunkbase numeric app ID. Alias: app_viz_2_splunkbase_uid.
# app_viz_2_docs_url =
# app_viz_2_troubleshoot_url =
# app_viz_2_install_url =
#
# ── External link ────────────────────────────────────────────────────────────
# learn_more_url = https://cisco.com/… ; "Learn More" button destination
#
# ── Legacy / predecessor / community apps ────────────────────────────────────
# legacy_uids = 1234,5678              ; comma-separated Splunkbase numeric IDs (resolved via CSV lookup)
# legacy_apps = Old_TA_widget          ; comma-separated legacy app folder names (parallel to legacy_uids)
# legacy_labels = Old Widget Add-on    ; display names parallel to legacy_apps
# legacy_urls = https://splunkbase.splunk.com/app/1234  ; Splunkbase URLs parallel to legacy_apps
# legacy_statuses = archived           ; "active" or "archived" per entry (defaults to "active")
#
# ── Prerequisite apps ────────────────────────────────────────────────────────
# prereq_apps = splunk_app_stream      ; comma-separated app folder names for required dependencies
# prereq_labels = Splunk App for Stream ; display names parallel to prereq_apps
# prereq_uids = 1809                   ; Splunkbase numeric IDs parallel to prereq_apps
# prereq_urls = https://splunkbase.splunk.com/app/1809  ; Splunkbase URLs parallel to prereq_apps
#
# ── Data ─────────────────────────────────────────────────────────────────────
# sourcetypes = cisco:widget:event,cisco:widget:log  ; comma-separated expected sourcetypes
# dashboards = widget_overview         ; default dashboard XML name(s) to link
# custom_dashboard =                   ; override dashboard (app_id/view_name format, stored in local/)
#
# ── Search / UX ──────────────────────────────────────────────────────────────
# keywords = widget,wgt,gadget         ; comma-separated search/filter terms (primary acronym first)
# aliases = Former Product Name        ; alternate product names for search + "Formerly:" display
# icon_svg = widget_icon               ; icon filename in icons/ dir (without .svg); _white.svg for dark mode
# icon_emoji = shield                  ; fallback emoji key from ICON_EMOJI_MAP (32 mapped)
# sort_order = 50                      ; numeric sort weight (lower = higher in list)
#
# ── Card appearance ──────────────────────────────────────────────────────────
# card_accent = #049fd9                ; 4px bold left-border stripe color (hex)
# card_bg_color = ice                  ; background: ice | mint | lavender | rose | cream | smoke | sky | pearl | hex
# card_banner = Powered by Cisco Security Cloud  ; diagonal translucent watermark text
# card_banner_color = cisco            ; banner color: blue | green | gold | red | purple | teal | cisco | hex
# card_banner_size = medium            ; small (11px) | medium (13px) | large (16px)
# card_banner_opacity = 0.12           ; 0.0–1.0 (default ≈ 0.055)
#
# ── SOAR connectors ─────────────────────────────────────────────────────────
# soar_connector_uids = 1111,2222      ; comma-separated Splunkbase UIDs (used for CSV lookup)
# soar_connector_label = Cisco Widget  ; display label for first connector (up to 3: _2_, _3_)
# soar_connector_uid = 1111            ; Splunkbase numeric ID for first connector
# soar_connector_url = https://splunkbase.splunk.com/app/1111
#
# ── Alert actions ────────────────────────────────────────────────────────────
# alert_action_uids = 4444,5555        ; comma-separated Splunkbase UIDs (used for CSV lookup)
# alert_action_label = Widget Alert    ; display label for first alert action (up to 2: _2_)
# alert_action_uid = 4444              ; Splunkbase numeric ID for first alert action
# alert_action_url = https://splunkbase.splunk.com/app/4444
#
# ── ITSI content pack ───────────────────────────────────────────────────────
# itsi_content_pack_label = Cisco Widget ITSI Pack
# itsi_content_pack_docs_url = https://…
#
# ── SC4S (Splunk Connect for Syslog) ────────────────────────────────────────
# sc4s_url = https://splunk.github.io/splunk-connect-for-syslog/main/sources/vendor/Cisco/cisco_widget/
# sc4s_label = SC4S: Cisco Widget                ; display text for the SC4S link
# sc4s_supported = true                          ; flag for SC4S filter pill
# sc4s_search_head_ta = Splunk_TA_cisco_widget   ; search-head TA needed for SC4S field extractions
