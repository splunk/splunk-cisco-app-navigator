# sc4s_search_head_ta_install_url = /manager/…   ; Splunk Manager deep-link
# sc4s_sourcetypes = cisco:widget:syslog         ; sourcetypes delivered via SC4S path
# sc4s_config_notes = Note one|Note two          ; pipe-delimited config tips
#
# ── NetFlow (Splunk Stream) ─────────────────────────────────────────────────
