
# ########## SCAN App Logs ##########
#
# "Super Six" / "Magic Six" props.conf settings for optimal ingest:
#   1. SHOULD_LINEMERGE = false   — disable expensive line-merging heuristics
#   2. TIME_FORMAT                — explicit strptime to skip datetime.xml guessing
#   3. LINE_BREAKER              — event-boundary regex (here = newline before timestamp)
#   4. TRUNCATE                  — raised from default 10000 to accommodate larger events
#   5. TIME_PREFIX               — anchor where the timestamp starts (reduces false matches)
#   6. MAX_TIMESTAMP_LOOKAHEAD   — cap character scan for timestamp parsing
#
# Log format produced by download_splunkbase_csv.py:
#   2026-03-06 03:48:11+0000 [INFO] downloadsplunkbasecsv - message text here
#
# Events are always single-line.

# ── Source-level stanza (index-time) ──────────────────────────
[source::...download_splunkbase_csv.log]
sourcetype = scan:downloadsplunkbasecsv:log

# 1. SHOULD_LINEMERGE — events are always single-line; skip the aggregator
SHOULD_LINEMERGE = false

# 2. TIME_FORMAT — explicit strptime matching "2026-03-06 03:48:11+0000"
TIME_FORMAT = %Y-%m-%d %H:%M:%S%z

# 3. LINE_BREAKER — newline followed by a timestamp (event boundary)
LINE_BREAKER = ([\n\r]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}

# 4. TRUNCATE — raised from 10000 default; signals PS-optimized sourcetype
TRUNCATE = 50000

# 5. TIME_PREFIX — timestamp is at the start of each line
TIME_PREFIX = ^

# 6. MAX_TIMESTAMP_LOOKAHEAD — "2026-03-06 03:48:11+0000" = 24 chars
MAX_TIMESTAMP_LOOKAHEAD = 24

# ── Sourcetype-level stanza (search-time) ─────────────────────
[scan:downloadsplunkbasecsv:log]
category = Custom
KV_MODE = none
EXTRACT-log_level = \[(?<log_level>DEBUG|INFO|WARNING|ERROR|CRITICAL)\]
EXTRACT-logger_name = \]\s+(?<logger_name>downloadsplunkbasecsv)\s+-
EXTRACT-message = \]\s+downloadsplunkbasecsv\s+-\s+(?<message>.*)
