
# ########## SCAN App Logs ##########
#
# "Magic Eight" props.conf settings for optimal ingest:
#   1. SHOULD_LINEMERGE = false   — disable expensive line-merging heuristics
#   2. TIME_FORMAT                — explicit strptime to skip datetime.xml guessing
#   3. LINE_BREAKER              — event-boundary regex (here = newline before timestamp)
#   4. TRUNCATE                  — raised from default 10000 to accommodate larger events
#   5. TIME_PREFIX               — anchor where the timestamp starts (reduces false matches)
#   6. MAX_TIMESTAMP_LOOKAHEAD   — cap character scan for timestamp parsing
#   7. ANNOTATE_PUNCT = false    — disable punct:: indexed field generation (CPU + disk savings)
#   8. LEARN_SOURCETYPE = false  — disable sourcetype classification heuristic (trust assigned)
#
# Log format produced by synclookup.py and synccatalog.py:
#   2026-03-06 03:48:11+0000 [INFO] synclookup - message text here
#
# Events are always single-line.

# ══════════════════════════════════════════════════════════════
#  synclookup — Splunkbase lookup sync command
# ══════════════════════════════════════════════════════════════

# ── Source-level stanza (index-time) ──────────────────────────
[source::...synclookup.log]
sourcetype = scan:synclookup:log
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%d %H:%M:%S%z
LINE_BREAKER = ([\n\r]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 24
ANNOTATE_PUNCT = false
LEARN_SOURCETYPE = false

# ── Sourcetype-level stanza (search-time) ─────────────────────
[scan:synclookup:log]
category = Custom
KV_MODE = none
EXTRACT-log_level = \[(?<log_level>DEBUG|INFO|WARNING|ERROR|CRITICAL)\]
EXTRACT-logger_name = \]\s+(?<logger_name>synclookup)\s+-
EXTRACT-message = \]\s+synclookup\s+-\s+(?<message>.*)

# ══════════════════════════════════════════════════════════════
#  synccatalog — products.conf catalog sync command
# ══════════════════════════════════════════════════════════════

# ── Source-level stanza (index-time) ──────────────────────────
[source::...synccatalog.log]
sourcetype = scan:synccatalog:log
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%d %H:%M:%S%z
LINE_BREAKER = ([\n\r]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 24
ANNOTATE_PUNCT = false
LEARN_SOURCETYPE = false

# ── Sourcetype-level stanza (search-time) ─────────────────────
[scan:synccatalog:log]
category = Custom
KV_MODE = none
EXTRACT-log_level = \[(?<log_level>DEBUG|INFO|WARNING|ERROR|CRITICAL)\]
EXTRACT-logger_name = \]\s+(?<logger_name>synccatalog)\s+-
EXTRACT-message = \]\s+synccatalog\s+-\s+(?<message>.*)
