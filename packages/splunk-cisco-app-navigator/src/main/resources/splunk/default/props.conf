# ##############################################################################
#  SCAN App Logs — props.conf
#  This file is a reference implementation of the "Magic Eight" best practices
#  for Splunk ingestion. Use it as the best example for the Magic 8 audit.
# ##############################################################################
#
#  MAGIC EIGHT (index-time, on the stanza that governs ingestion)
#  ─────────────────────────────────────────────────────────────
#  1. SHOULD_LINEMERGE = false   — Disable line-merge heuristics (biggest CPU win)
#  2. LINE_BREAKER               — Explicit event-boundary regex
#  3. TRUNCATE                   — Non-default so it's clear someone reviewed it
#  4. TIME_FORMAT                — Explicit strptime (no datetime.xml guessing)
#  5. TIME_PREFIX                — Where the timestamp starts (reduces false matches)
#  6. MAX_TIMESTAMP_LOOKAHEAD    — Cap scan window for timestamp parsing
#  7. ANNOTATE_PUNCT = false     — Disable punct:: field (CPU + disk savings)
#  8. LEARN_SOURCETYPE = false   — Trust assigned sourcetype; no classification
#
#  When a source or host stanza sets sourcetype, that stanza owns ingestion.
#  Put the Magic Eight there; use the sourcetype stanza only for search-time
#  extras (category, KV_MODE, EXTRACT-*, etc.). The Magic 8 audit uses this
#  rule: one row per stream, auditing the stanza that actually governs ingest.
#
#  Log format produced by synclookup.py and synccatalog.py:
#    2026-03-06 03:48:11+0000 [INFO] synclookup - message text here
#  Events are always single-line.
#
# ##############################################################################

# ══════════════════════════════════════════════════════════════
#  synclookup — Splunkbase lookup sync command
# ══════════════════════════════════════════════════════════════

# ── Source-level stanza (index-time) ──────────────────────────
# This stanza governs ingestion for source paths matching ...synclookup.log.
# All Magic Eight settings live here; the sourcetype stanza below is search-time only.
[source::...synclookup.log]
sourcetype = scan:synclookup:log
# 1. Disable line-merge heuristics (biggest CPU win)
SHOULD_LINEMERGE = false
# 2. Explicit event-boundary regex
LINE_BREAKER = ([\n\r]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}
# 3. Non-default so it's clear someone reviewed it
TRUNCATE = 9999
# 4. Explicit strptime (no datetime.xml guessing)
TIME_FORMAT = %Y-%m-%d %H:%M:%S%z
# 5. Where the timestamp starts (reduces false matches)
TIME_PREFIX = ^
# 6. Cap scan window for timestamp parsing
MAX_TIMESTAMP_LOOKAHEAD = 24
# 7. Disable punct:: field (CPU + disk savings)
ANNOTATE_PUNCT = false
# 8. Trust assigned sourcetype; no classification
LEARN_SOURCETYPE = false

# ── Sourcetype-level stanza (search-time only) ────────────────
# No Magic Eight here: ingestion is controlled by the source stanza above.
# This stanza adds: category, KV_MODE (no auto key-value extraction), EXTRACT-*.
[scan:synclookup:log]
category = Custom
KV_MODE = none
EXTRACT-log_level = \[(?<log_level>DEBUG|INFO|WARNING|ERROR|CRITICAL)\]
EXTRACT-logger_name = \]\s+(?<logger_name>synclookup)\s+-
EXTRACT-message = \]\s+synclookup\s+-\s+(?<message>.*)

# ══════════════════════════════════════════════════════════════
#  synccatalog — products.conf catalog sync command
# ══════════════════════════════════════════════════════════════

# ── Source-level stanza (index-time) ──────────────────────────
# Same pattern: source stanza owns ingestion and carries the Magic Eight.
[source::...synccatalog.log]
sourcetype = scan:synccatalog:log
# 1. Disable line-merge heuristics (biggest CPU win)
SHOULD_LINEMERGE = false
# 2. Explicit event-boundary regex
LINE_BREAKER = ([\n\r]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}
# 3. Non-default so it's clear someone reviewed it
TRUNCATE = 9999
# 4. Explicit strptime (no datetime.xml guessing)
TIME_FORMAT = %Y-%m-%d %H:%M:%S%z
# 5. Where the timestamp starts (reduces false matches)
TIME_PREFIX = ^
# 6. Cap scan window for timestamp parsing
MAX_TIMESTAMP_LOOKAHEAD = 24
# 7. Disable punct:: field (CPU + disk savings)
ANNOTATE_PUNCT = false
# 8. Trust assigned sourcetype; no classification
LEARN_SOURCETYPE = false

# ── Sourcetype-level stanza (search-time only) ────────────────
[scan:synccatalog:log]
category = Custom
KV_MODE = none
EXTRACT-log_level = \[(?<log_level>DEBUG|INFO|WARNING|ERROR|CRITICAL)\]
EXTRACT-logger_name = \]\s+(?<logger_name>synccatalog)\s+-
EXTRACT-message = \]\s+synccatalog\s+-\s+(?<message>.*)
