### 31. Installed vs Catalog — Full Estate Audit  ############################
# Cross-reference EVERYTHING installed on this Splunk instance against the catalog.
[SCAN - Installed vs Splunkbase - Full Estate Audit]
description = Cross-references every locally installed app against the synced Splunkbase catalog. Identifies which installed apps are Cisco-related, their support level, archive status, and whether they are current or deprecated. The definitive audit of your Cisco Splunk footprint.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /services/apps/local \
| where core=0 \
| rename title as appid, label as installed_name \
| eval installed_version=version \
| fields appid installed_name installed_version disabled \
| join type=left appid \
    [| inputlookup scan_splunkbase_apps \
    | fields appid uid title type support is_archived archive_status app_version product_compatibility categories] \
| where isnotnull(uid) \
| eval cloud=if(like(product_compatibility,"%Cloud%"),"yes","no") \
| eval version_match=if(installed_version==app_version,"✅ Current","⚠️️ ".installed_version." → ".app_version) \
| eval status=case(is_archived=="true","🔴 Archived",archive_status=="archived_manually","🟠 Deprecated",disabled=="1","⚪ Disabled",1==1,"🟢 Active") \
| table appid installed_name status categories type support cloud version_match installed_version app_version \
| sort 0 status categories appid

