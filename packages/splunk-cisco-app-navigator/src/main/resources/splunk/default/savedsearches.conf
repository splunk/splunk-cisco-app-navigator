##############################################################################
# SCAN — Ad-hoc / Troubleshooting Saved Searches
# Run these from the Search bar or Saved Searches page to inspect the
# product catalog, audit data quality, and troubleshoot in the field.
##############################################################################

###  1. Full Catalog Dump  ###################################################
# Every field from products.conf in one table. Good starting point.
[SCAN - Product Catalog - Full Dump]
description = Dumps every field from products.conf into a single table. Use this as a starting point for inspecting the full Cisco product catalog, including add-on families, SOAR connectors, alert actions, legacy apps, sourcetypes, and sort order.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| fields app title display_name description value_proposition vendor tagline \
    category subcategory version status support_level \
    addon addon_label addon_family addon_uid addon_docs_url \
    app_viz app_viz_label app_viz_uid app_viz_docs_url \
    app_viz_2 app_viz_2_label app_viz_2_uid app_viz_2_docs_url \
    learn_more_url \
    legacy_uids community_uids \
    soar_connector_uids alert_action_uids \
    sourcetypes dashboards custom_dashboard \
    aliases keywords icon_svg icon_emoji sort_order disabled \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| sort 0 +sort_order \
| table title display_name category subcategory status support_level addon_family addon_label app_viz_label app_viz_2_label \
    soar_connector_uids alert_action_uids community_uids legacy_uids aliases sourcetypes sort_order

###  2. Category Summary  ####################################################
# Product counts by category and status — quick health check.
[SCAN - Product Catalog - By Category]
description = Summarizes product counts by category (Security, Networking, Collaboration, Observability, Deprecated) and shows active, deprecated, and coming-soon breakdowns. Quick health check for catalog completeness.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| stats count as total \
    dc(eval(if(status=="active",title,null()))) as active \
    dc(eval(if(status=="deprecated",title,null()))) as deprecated \
    dc(eval(if(status=="under_development",title,null()))) as coming_soon \
    values(eval(if(status=="active",display_name,null()))) as products \
    by category \
| sort - total

###  3. Add-on Family Summary  ###############################################
# Group products by addon_family to see install-flow groupings.
[SCAN - Product Catalog - By Add-on Family]
description = Groups products by their add-on family (e.g. security-cloud, catalyst, collaboration). Shows which products share the same Splunk add-on and helps plan consolidated installations.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| stats count as product_count \
    values(display_name) as products \
    values(addon_label) as addon_labels \
    by addon_family \
| sort - product_count

###  4. SOAR Connector Inventory  ############################################
# Products with SOAR connectors — shows connector labels and Splunkbase UIDs.
[SCAN - SOAR Connector Inventory]
description = Lists every product that has one or more Splunk SOAR connectors available, with Splunkbase UIDs resolved to connector names. Use this to identify SOAR automation opportunities across your Cisco estate.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(soar_connector_uids) \
| eval soar_uid=split(soar_connector_uids,",") \
| mvexpand soar_uid \
| eval soar_uid=trim(soar_uid) \
| lookup scan_splunkbase_apps uid AS soar_uid OUTPUT title AS connector_label \
| eval connector_label=if(isnotnull(connector_label), connector_label." (#".soar_uid.")", "UID ".soar_uid) \
| stats values(connector_label) as connectors dc(soar_uid) as connector_count by display_name category \
| table display_name category connector_count connectors \
| sort 0 - connector_count display_name

###  5. Legacy App Inventory  ################################################
# Expand every legacy app per product — useful for migration planning.
[SCAN - Legacy App Inventory]
description = Expands every legacy (deprecated/archived) add-on per product into individual rows with Splunkbase UIDs resolved to app names. Essential for migration planning — identify which old TAs need to be replaced by the current add-on.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(legacy_uids) \
| eval legacy_uid=split(legacy_uids,",") \
| mvexpand legacy_uid \
| eval legacy_uid=trim(legacy_uid) \
| lookup scan_splunkbase_apps uid AS legacy_uid OUTPUT title AS legacy_label, appid AS legacy_app \
| eval legacy_label=if(isnotnull(legacy_label), legacy_label, "UID ".legacy_uid) \
| table display_name category addon_label legacy_app legacy_label legacy_uid \
| sort 0 display_name legacy_uid

###  6. Sourcetype Coverage  #################################################
# All sourcetypes across all products — find overlaps or gaps.
[SCAN - Sourcetype Coverage]
description = Lists every sourcetype tracked across all products and shows which products share each sourcetype. Useful for detecting overlaps (multiple products ingesting the same data) and finding gaps in sourcetype coverage.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(sourcetypes) \
| eval sourcetype=split(sourcetypes,",") \
| mvexpand sourcetype \
| eval sourcetype=trim(sourcetype) \
| stats values(display_name) as products dc(display_name) as product_count by sourcetype \
| sort 0 - product_count sourcetype

###  7. Missing Fields Audit  ################################################
# Find products with missing critical fields — data quality check.
[SCAN - Data Quality - Missing Fields Audit]
description = Identifies products with missing critical fields such as sourcetypes, descriptions, keywords, learn_more_url, addon URLs, icons, or dashboards. Run this after catalog edits to catch data quality issues before they reach customers.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval missing=mvappend( \
    if(isnull(display_name),"display_name",null()), \
    if(isnull(description),"description",null()), \
    if(isnull(category),"category",null()), \
    if(isnull(status),"status",null()), \
    if(isnull(support_level),"support_level",null()), \
    if(isnull(subcategory),"subcategory",null()), \
    if(isnull(sourcetypes),"sourcetypes",null()), \
    if(isnull(keywords),"keywords",null()), \
    if(isnull(icon_svg),"icon_svg",null()), \
    if(isnull(icon_emoji),"icon_emoji",null()), \
    if(isnull(addon) AND status=="active","addon",null()), \
    if(isnull(addon_label) AND isnotnull(addon),"addon_label",null()), \
    if(isnull(addon_uid) AND isnotnull(addon),"addon_uid",null()), \
    if(isnull(addon_docs_url) AND isnotnull(addon),"addon_docs_url",null()), \
    if(isnull(learn_more_url),"learn_more_url",null()), \
    if(isnull(value_proposition),"value_proposition",null()), \
    if(isnull(dashboards),"dashboards",null()) \
    ) \
| where isnotnull(missing) \
| eval missing_count=mvcount(missing) \
| table display_name category subcategory status support_level missing_count missing \
| sort 0 - missing_count display_name

###  8. Products with Prerequisites  #########################################
# Products that require companion apps (e.g. Splunk Stream).
[SCAN - Products with Prerequisites]
description = DISABLED — Prerequisites (prereq_apps) were removed from products.conf. This search is retained for reference only.
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | makeresults | eval message="prereq_apps fields have been removed from products.conf" | table message

###  9. Installed Apps vs Catalog  ###########################################
# Cross-reference locally installed apps against addon and legacy_uids fields.
# Shows which products have their add-on installed and which legacy TAs are
# still present — critical for migration troubleshooting.
[SCAN - Installed Apps vs Catalog]
description = Cross-references locally installed Splunk apps against the product catalog's addon and legacy_uids fields. Shows which products have their current add-on installed and flags any legacy TAs still present — critical for migration troubleshooting.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| fields title display_name category status addon addon_label legacy_uids \
| join type=left addon \
    [| rest splunk_server=local /services/apps/local \
     | where core=0 \
     | rename title as installed_addon_name, label as installed_label \
     | eval addon=installed_addon_name \
     | fields addon installed_label \
     | dedup addon ] \
| eval addon_installed=if(isnotnull(installed_label),"YES","no") \
| eval legacy_uid_list=split(legacy_uids,",") \
| eval legacy_uid_list=mvmap(legacy_uid_list, trim(legacy_uid_list)) \
| eval legacy_count=if(isnotnull(legacy_uid_list), mvcount(legacy_uid_list), 0) \
| table display_name category status addon_label addon_installed legacy_uids legacy_count \
| sort 0 category display_name

### 10. Splunkbase ↔ products.conf Gap Analysis  ##############################
# Cross-reference scan_splunkbase_apps with products.conf to find rows
# that don't map to any product stanza (by folder name / appid).
[SCAN - Gap Analysis - Splunkbase vs Catalog]
description = Cross-references the scan_splunkbase_apps lookup (synced Splunkbase catalog) against products.conf to find live, non-archived entries whose appid doesn't appear as any addon, app_viz, or UID-resolved legacy/community app in a product stanza. Surfaces apps that may need to be added to the catalog or mapped to an existing product.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false archive_status!=flagged type IN ("app","addon") \
| table uid appid title type support app_version sourcetypes \
| join type=left appid \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-products \
    | rename eai:acl.app as app \
    | fields addon app_viz app_viz_2 legacy_uids community_uids \
    | eval uid_list=mvappend(split(legacy_uids,","), split(community_uids,",")) \
    | eval uid_list=mvmap(uid_list, trim(uid_list)) \
    | eval uid_list=mvfilter(uid_list!="") \
    | eval uid_list=mvdedup(uid_list) \
    | eval folder=mvappend(addon, app_viz, app_viz_2) \
    | eval folder=mvfilter(isnotnull(folder) AND folder!="") \
    | append [| rest splunk_server=local /servicesNS/-/-/configs/conf-products \
        | fields legacy_uids community_uids \
        | eval uid=mvappend(split(legacy_uids,","), split(community_uids,",")) \
        | mvexpand uid \
        | eval uid=trim(uid) \
        | where uid!="" \
        | lookup scan_splunkbase_apps uid OUTPUT appid \
        | where isnotnull(appid) \
        | eval folder=appid \
        | fields folder] \
    | mvexpand folder \
    | dedup folder \
    | eval found=1 \
    | rename folder as appid \
    | fields appid found ] \
| where isnull(found)

### 11. Ecosystem Summary  ###################################################
# One-row rollup of the entire catalog: total products, categories, add-on
# families, legacy apps, SOAR connectors, sourcetypes, alert actions.
[SCAN - Ecosystem Summary]
description = One-row rollup of the entire Cisco-Splunk ecosystem: total products, categories, add-on families, active/deprecated/coming-soon counts, legacy apps, sourcetypes, SOAR connectors, visualization apps, and alert actions. The executive dashboard for catalog health.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval legacy_count=if(isnotnull(legacy_uids),mvcount(split(legacy_uids,",")),0) \
| eval sourcetype_count=if(isnotnull(sourcetypes),mvcount(split(sourcetypes,",")),0) \
| eval has_soar=if(isnotnull(soar_connector_uids),1,0) \
| eval has_viz=if(isnotnull(app_viz),1,0) \
| eval has_alert=if(isnotnull(alert_action_uids),1,0) \
| eval has_community=if(isnotnull(community_uids),1,0) \
| eval has_itsi=if(isnotnull(itsi_content_pack_label),1,0) \
| eval has_es=if(es_compatible=="true",1,0) \
| eval has_sc4s=if(sc4s_supported=="true" OR isnotnull(sc4s_url),1,0) \
| eval has_netflow=if(netflow_supported=="true",1,0) \
| eval has_ai=if(ai_enabled=="true",1,0) \
| stats dc(title) as total_products \
    dc(category) as categories \
    dc(addon_family) as addon_families \
    dc(eval(if(status=="active",title,null()))) as active \
    dc(eval(if(status=="deprecated",title,null()))) as deprecated \
    dc(eval(if(status=="retired",title,null()))) as retired \
    dc(eval(if(status=="roadmap",title,null()))) as roadmap \
    dc(eval(if(status=="under_development",title,null()))) as coming_soon \
    sum(legacy_count) as total_legacy_apps \
    sum(sourcetype_count) as total_sourcetypes \
    sum(has_soar) as products_with_soar \
    sum(has_viz) as products_with_viz_app \
    sum(has_alert) as products_with_alert_action \
    sum(has_community) as products_with_community_alt \
    sum(has_itsi) as products_with_itsi \
    sum(has_es) as products_with_es \
    sum(has_sc4s) as products_with_sc4s \
    sum(has_netflow) as products_with_netflow \
    sum(has_ai) as products_with_ai


##############################################################################
# SCAN — Splunkbase-Powered Searches (scan_splunkbase_apps lookup)
# These searches leverage the synced Splunkbase catalog for ecosystem
# intelligence, version tracking, and deployment readiness.
##############################################################################

### 12. Splunkbase Ecosystem Overview  #######################################
# Full dump of the scan_splunkbase_apps lookup — browse every app/addon/connector.
[SCAN - Splunkbase Ecosystem Overview]
description = Full dump of the synced Splunkbase catalog. Shows every Cisco-related app, add-on, and SOAR connector with key metadata: support level, version, archive status, Splunk platform compatibility, and last update date.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| eval updated_date=strftime(updated_time,"%Y-%m-%d") \
| table uid appid title type support app_version is_archived archive_status product_compatibility updated_date download_count rating \
| sort 0 type support title

### 13. Support Level Distribution  ##########################################
# Breakdown of apps by support level and type — cisco vs splunk vs developer.
[SCAN - Support Level Distribution]
description = Breaks down the Splunkbase ecosystem by support level (cisco, splunk, developer, not_supported) and app type (app, addon, connector). Shows counts and lists of apps in each tier.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| stats count as total \
    dc(eval(if(type=="app",appid,null()))) as apps \
    dc(eval(if(type=="addon",appid,null()))) as addons \
    dc(eval(if(type=="connector",appid,null()))) as connectors \
    values(eval(if(is_archived=="false",title,null()))) as live_apps \
    by support \
| sort 0 - total

### 14. Version & Update Tracker  ############################################
# Identify stale or recently updated apps — sorted by last update date.
[SCAN - Version and Update Tracker]
description = Shows every live (non-archived) app sorted by last update date. Highlights stale apps that haven't been updated recently and freshly updated ones. Useful for tracking Splunkbase release cadence across the Cisco portfolio.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false \
| eval updated_epoch=updated_time \
| eval days_since_update=round((now()-updated_epoch)/86400) \
| eval staleness=case(days_since_update<=90,"fresh",days_since_update<=365,"current",days_since_update<=730,"aging",1==1,"stale") \
| table title type support app_version days_since_update staleness updated_time \
| sort 0 - days_since_update

### 15. Cloud vs Enterprise Compatibility  ###################################
# Which apps support Splunk Cloud, Enterprise, or both?
[SCAN - Platform Compatibility Matrix]
description = Maps every live app to its supported Splunk platforms (Cloud, Enterprise, or both). Helps Splunk Cloud admins identify which Cisco apps are available on their platform and which are Enterprise-only.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| eval supports_cloud=if(like(product_compatibility,"%Cloud%"),"yes","no") \
| eval supports_enterprise=if(like(product_compatibility,"%Enterprise%"),"yes","no") \
| eval platform_support=case(supports_cloud=="yes" AND supports_enterprise=="yes","both",supports_cloud=="yes","cloud_only",supports_enterprise=="yes","enterprise_only",1==1,"unknown") \
| stats count by platform_support \
| append [| inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| eval supports_cloud=if(like(product_compatibility,"%Cloud%"),"yes","no") \
| eval platform_support=case(supports_cloud=="yes","cloud_compatible",1==1,"enterprise_only") \
| stats values(title) as apps count by platform_support ]

### 16. Deployment Readiness  ################################################
# Install method support across apps — single, distributed, cloud.
[SCAN - Deployment Readiness]
description = Shows the install method support for each live app — whether it can be installed via single-instance, distributed (cluster), or cloud self-service. Apps marked 'rejected' for a method cannot be deployed that way.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| table title type support install_method_single install_method_distributed install_method_cloud app_version \
| sort 0 type support title

### 17. CIM Compatibility Report  ############################################
# Which apps declare CIM compatibility?
[SCAN - CIM Compatibility Report]
description = Lists apps that declare Common Information Model (CIM) compatibility, showing which CIM versions they support and their associated CIM tags. Essential for Enterprise Security and data model acceleration planning.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false cim_compatibility!="" \
| table title type support cim_compatibility cim_tags app_version \
| sort 0 type title

### 18. FedRAMP & FIPS Compliance  ###########################################
# Identify apps with FedRAMP validation or FIPS compatibility flags.
[SCAN - Compliance Status (FedRAMP and FIPS)]
description = Shows the FedRAMP validation and FIPS compatibility status for each live app. Critical for GovCloud and regulated-environment customers who need to validate their Cisco Splunk stack meets compliance requirements.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| table title type support fedramp_validation fips_compatibility app_version \
| sort 0 support title

### 19. Archived / Superseded Apps  ##########################################
# All archived apps — useful for migration planning and cleanup.
[SCAN - Archived App Inventory]
description = Lists every archived or deprecated app in the synced Splunkbase catalog. Shows archive status, last update date, and version. Essential for identifying old TAs that customers may still have installed and need to migrate off of.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=true OR archive_status IN ("archived","archived_manually") \
| eval updated_date=strftime(updated_time,"%Y-%m-%d") \
| table uid appid title type support archive_status app_version updated_date \
| sort 0 type title

### 20. Splunk Version Compatibility Matrix  #################################
# Which Splunk versions does each app support?
[SCAN - Splunk Version Compatibility]
description = Maps every live app to the Splunk Enterprise/Cloud versions it supports. Helps admins planning upgrades confirm that their Cisco apps will remain compatible with the target Splunk version.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") version_compatibility!="" \
| eval splunk_versions=split(version_compatibility,"|") \
| table title type support version_compatibility app_version \
| sort 0 type title

### 21. Download Popularity Ranking  #########################################
# Top apps by download count — community adopti on signal.
[SCAN - Download Popularity Ranking]
description = Ranks all live Cisco Splunkbase apps by download count. Shows community adoption and popularity across the ecosystem. Useful for identifying the most widely deployed integrations.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| eval downloads=tonumber(download_count) \
| table title type support downloads rating app_version \
| sort 0 - downloads

### 22. Sourcetype Cross-Reference  ##########################################
# Compare sourcetypes declared in CSV vs products.conf — find mismatches.
[SCAN - Sourcetype Cross-Reference]
description = Cross-references sourcetypes declared in the Splunkbase catalog against sourcetypes configured in products.conf for each product's addon and app_viz. Helps identify sourcetypes that should be added to product stanzas or that have drifted between the catalog and products.conf.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(addon) \
| eval conf_sourcetypes=sourcetypes \
| fields display_name addon conf_sourcetypes \
| join type=left addon \
    [| inputlookup scan_splunkbase_apps \
    | rename appid as addon, sourcetypes as csv_sourcetypes \
    | fields addon csv_sourcetypes ] \
| where isnotnull(csv_sourcetypes) AND isnotnull(conf_sourcetypes) \
| eval csv_st=split(csv_sourcetypes,"|"), conf_st=split(conf_sourcetypes,",") \
| eval conf_st=mvmap(conf_st, trim(conf_st)) \
| eval in_csv_not_conf=mvfilter(NOT match(csv_st, "^$")), in_conf_not_csv=mvfilter(NOT match(conf_st, "^$")) \
| eval in_csv_not_conf=mvfilter(NOT match(csv_st, "conf_st")) \
| table display_name addon csv_sourcetypes conf_sourcetypes \
| sort 0 display_name


