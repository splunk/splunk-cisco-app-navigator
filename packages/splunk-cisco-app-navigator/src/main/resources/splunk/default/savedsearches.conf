### 23. All Apps & Add-ons Involved  #########################################
# Comprehensive view of EVERY app/add-on referenced per product — addons,
# viz apps, legacy apps, community apps, SOAR connectors, alert actions.
[SCAN - All Apps and Add-ons Involved]
description = Shows every Splunk app and add-on referenced by each product in the catalog — primary add-on, visualization apps, legacy/deprecated TAs (via legacy_uids), community alternatives (via community_uids), SOAR connectors (via soar_connector_uids), and alert actions (via alert_action_uids). Provides the complete dependency map for each Cisco product.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval addon_info=if(isnotnull(addon), addon." → ".addon_label, null()) \
| eval viz_info=mvappend( \
    if(isnotnull(app_viz), app_viz." → ".app_viz_label, null()), \
    if(isnotnull(app_viz_2), app_viz_2." → ".app_viz_2_label, null()) \
    ) \
| eval legacy_uid_list=if(isnotnull(legacy_uids), split(legacy_uids,","), null()) \
| eval legacy_uid_list=mvmap(legacy_uid_list, trim(legacy_uid_list)) \
| eval community_uid_list=if(isnotnull(community_uids), split(community_uids,","), null()) \
| eval community_uid_list=mvmap(community_uid_list, trim(community_uid_list)) \
| eval soar_uid_list=if(isnotnull(soar_connector_uids), split(soar_connector_uids,","), null()) \
| eval soar_uid_list=mvmap(soar_uid_list, trim(soar_uid_list)) \
| eval alert_uid_list=if(isnotnull(alert_action_uids), split(alert_action_uids,","), null()) \
| eval alert_uid_list=mvmap(alert_uid_list, trim(alert_uid_list)) \
| eval total_apps = 0 \
    + if(isnotnull(addon), 1, 0) \
    + if(isnotnull(app_viz), 1, 0) \
    + if(isnotnull(app_viz_2), 1, 0) \
    + if(isnotnull(legacy_uid_list), mvcount(legacy_uid_list), 0) \
    + if(isnotnull(community_uid_list), mvcount(community_uid_list), 0) \
    + if(isnotnull(soar_uid_list), mvcount(soar_uid_list), 0) \
    + if(isnotnull(alert_uid_list), mvcount(alert_uid_list), 0) \
| table display_name category addon_family total_apps addon_info viz_info legacy_uids community_uids soar_connector_uids alert_action_uids \
| sort 0 - total_apps display_name

### 24. Splunkbase Category Breakdown  ######################################
# Distribution of apps across Splunkbase categories.
[SCAN - Splunkbase Category Breakdown]
description = Groups all Splunkbase apps by their Splunkbase category. Shows the breadth of the Cisco-Splunk ecosystem per business domain.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false \
| makemv delim="|" categories \
| stats count as total \
    values(title) as apps \
    dc(eval(if(type=="addon",appid,null()))) as addons \
    dc(eval(if(type=="app",appid,null()))) as viz_apps \
    by categories \
| sort 0 categories - total

### 26. App Age Analysis  ####################################################
# How old are these apps? When were they first published vs last updated?
[SCAN - App Age Analysis]
description = Analyzes the age of each app from first publication to last update. Shows days since creation, days since last update, and active development lifespan. Identifies abandoned or actively maintained apps.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| eval created_epoch=created_time \
| eval updated_epoch=updated_time \
| eval published_epoch=published_time \
| eval days_since_created=round((now()-created_epoch)/86400) \
| eval days_since_updated=round((now()-updated_epoch)/86400) \
| eval active_lifespan_days=round((updated_epoch-created_epoch)/86400) \
| eval created_date=strftime(created_epoch,"%Y-%m-%d") \
| eval updated_date=strftime(updated_epoch,"%Y-%m-%d") \
| eval health=case(days_since_updated<=180,"🟢 Active",days_since_updated<=365,"🟡 Maintained",days_since_updated<=730,"🟠 Aging",1==1,"🔴 Stale") \
| eval cloud=if(like(product_compatibility,"%Cloud%"),"yes","no") \
| eval release_count=if(isnotnull(release_history) AND release_history!="",mvcount(spath(release_history,"{}.version")),0) \
| table title type support cloud health days_since_updated active_lifespan_days release_count created_date updated_date app_version categories \
| sort 0 - days_since_updated

### 27. Apps per Support Level + Category Heatmap  #####################
# Cross-tabulate support level × category for a density view.
[SCAN - Support x Category Heatmap]
description = Cross-tabulates support level (cisco, splunk, developer, community) against Splunkbase category. Shows where official Cisco support is concentrated and where gaps exist with only community or third-party support.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| makemv delim="|" categories \
| chart count over support by categories \
| addtotals fieldname=Total

### 28. Deprecated App Migration Map  ########################################
# For every deprecated/archived app, find its replacement via products.conf.
[SCAN - Deprecated Migration Map]
description = Shows every deprecated or archived app alongside its replacement, derived from products.conf legacy_uids mappings resolved via Splunkbase lookup. Essential for planning TA migrations — identifies which current add-on replaces each archived entry.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=true OR archive_status IN ("archived","archived_manually") \
| table uid appid title type support categories \
| join type=left appid \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-products \
    | rename eai:acl.app as app \
    | fields display_name addon_label legacy_uids category \
    | where isnotnull(legacy_uids) \
    | eval legacy_uid=split(legacy_uids,",") \
    | mvexpand legacy_uid \
    | eval legacy_uid=trim(legacy_uid) \
    | lookup scan_splunkbase_apps uid AS legacy_uid OUTPUT appid AS legacy_appid \
    | where isnotnull(legacy_appid) \
    | rename legacy_appid as appid, display_name as replaced_by_product, addon_label as replacement_addon, category as product_category \
    | fields appid replaced_by_product replacement_addon product_category ] \
| eval migration_path=if(isnotnull(replacement_addon), title." → ".replacement_addon, title." → (no replacement mapped)") \
| table migration_path title replacement_addon replaced_by_product product_category type support \
| sort 0 product_category title

### 29. AppInspect & Validation Status  ######################################
# Security validation posture across the ecosystem.
[SCAN - Validation and AppInspect Status]
description = Shows the AppInspect pass/fail status, validation status, FedRAMP certification, and FIPS compatibility for every live app. Critical for security-conscious environments and Splunk Cloud vetting.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") \
| eval validation_status=case( \
    passed_validation=="true" AND appinspect_passed=="true", "✅ Fully Validated", \
    passed_validation=="true", "✅ Passed Validation", \
    appinspect_passed=="true", "⚠️️ AppInspect Only", \
    1==1, "❌ Not Validated") \
| eval compliance=mvappend( \
    if(fedramp_validation=="yes","FedRAMP",null()), \
    if(fips_compatibility=="yes","FIPS",null()), \
    if(like(product_compatibility,"%Cloud%"),"Cloud",null()) \
    ) \
| table title type support validation_status compliance appinspect_status app_version categories \
| sort 0 validation_status categories title

### 30. Install Footprint Estimator  #########################################
# How many apps would a customer need for each Splunkbase category?
[SCAN - Install Footprint by Category]
description = Estimates the number of apps, add-ons, and SOAR connectors a customer would need to deploy for each Splunkbase category. Helps capacity planning and scope estimation for new Cisco-Splunk deployments.
