### 32c. Cisco and Splunk Supported Apps (from Splunkbase lookup)  #############
# Single search: live apps/add-ons from scan_splunkbase_apps with support =
# cisco or splunk. Use this for dashboards that need only vendor-supported apps.
[SCAN - Cisco and Splunk Supported Apps]
description = Lists all non-archived apps and add-ons from the scan_splunkbase_apps lookup that are Cisco-supported or Splunk-supported. Single consolidated view for vendor-supported apps; use in dashboards instead of multiple Splunkbase searches when only support tier is needed.
