### 33. Splunkbase Catalog Sync  #############################################
# Scheduled job: (1) syncs products.conf from S3, then (2) downloads the
# latest Splunkbase CSV from S3, cleans and normalizes the data, then writes
# it to the scan_splunkbase_apps lookup.
# Runs daily at 3:39 AM. Powers all Splunkbase-powered searches and the
# platform/version compatibility filters in the SCAN UI.
[SCAN - Splunkbase Catalog Sync]
description = Scheduled daily sync: first updates products.conf from S3 (version-aware, with backup), then downloads the latest splunkbase_apps.csv.gz, normalizes field formatting (categories, sourcetypes, CIM tags, timestamps), deduplicates by UID, tags gold-standard Cisco apps, and writes the cleaned data to scan_splunkbase_apps.csv.gz. This job powers both the product catalog and Splunkbase intelligence.
enableSched = 1
schedule_window = auto
cron_schedule = 39 3 * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | synccatalog dryrun=false \
| append \
    [| synclookup input_csv=splunkbase_assets/splunkbase_apps.csv.gz output_csv=scan_splunkbase_apps.csv.gz \
    | where 1==2 \
    | inputlookup scan_splunkbase_apps append=t \
    | rex field=title mode=sed "s/^\(DEPRECATED\)\s+//g" \
    | foreach categories *_compatibility sourcetypes cim_tags \
        [| eval <<FIELD>>=trim(split(<<FIELD>>,"|")) ] \
    | foreach *_validation appinspect_status appinspect_passed is_archived archive_status fips_compatibility sourcetypes cim_tags \
        [| eval <<FIELD>>=trim(lower(<<FIELD>>)) ] \
    | foreach app_version sourcetypes cim_tags \
        [| eval <<FIELD>>=if(<<FIELD>>="null" OR <<FIELD>>="" OR isnull(<<FIELD>>), null(), <<FIELD>>) ] \
    | mvexpand categories \
    | stats \
        values(categories) as categories \
        values(product_compatibility) as product_compatibility \
        values(version_compatibility) as version_compatibility \
        values(cim_compatibility) as cim_compatibility \
        values(sourcetypes) as sourcetypes \
        values(cim_tags) as cim_tags \
        latest(appid) as appid \
        latest(type) as type \
        latest(access) as access \
        latest(created_by) as created_by \
        latest(title) as title \
        latest(hosting) as hosting \
        latest(app_version) as app_version \
        latest(platform) as platform \
        latest(is_archived) as is_archived \
        latest(archive_status) as archive_status \
        latest(support) as support \
        latest(fedramp_validation) as fedramp_validation \
        latest(fips_compatibility) as fips_compatibility \
        latest(passed_validation) as passed_validation \
        latest(appinspect_status) as appinspect_status \
        latest(appinspect_passed) as appinspect_passed \
        latest(description) as description \
        latest(documentation) as documentation \
        latest(download_count) as download_count \
        latest(notes) as notes \
        latest(size) as size \
        latest(filename) as filename \
        latest(release_history) as release_history \
        latest(updated_time) as updated_time \
        latest(created_time) as created_time \
        latest(published_time) as published_time \
        by uid \
    | eval created_time=strptime(created_time,"%Y-%m-%dT%H:%M:%S%z") , published_time=strptime(published_time,"%Y-%m-%dT%H:%M:%S") , updated_time=strptime(updated_time,"%Y-%m-%dT%H:%M:%S") \
    | rex field=created_time mode=sed "s/.000000//g" \
    | rex field=published_time mode=sed "s/.000000//g" \
    | rex field=updated_time mode=sed "s/.000000//g" \
    | eval hosting = if(match(appid,"^\d+"), "github", "splunkbase") \
    | foreach categories *_compatibility sourcetypes cim_tags \
        [| eval <<FIELD>>=trim(mvjoin(<<FIELD>>,"|")) ] \
    | table "uid","appid","title","type","created_by","access","download_count","app_version","platform","updated_time","created_time","published_time","appinspect_passed","appinspect_status","fedramp_validation","fips_compatibility","passed_validation","product_compatibility","version_compatibility","is_archived","archive_status","categories","cim_compatibility","support","description","documentation","notes","size","filename","release_history","sourcetypes","cim_tags" \
    | outputlookup scan_splunkbase_apps CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count ]


##############################################################################
# SCAN — Compatibility Filter Debuggers
# These searches replicate the exact filtering logic used by the SCAN UI
# when a Splunk platform or version is selected in the Compatibility
# dropdowns.  They extract Splunkbase UIDs from each product's addon,
# app_viz, and app_viz_2 URLs, then join against scan_splunkbase_apps
# to show what the UI sees.
##############################################################################

### 34. Product ↔ Platform Compatibility Debugger  ###########################
# For every product in the catalog, extracts its Splunkbase UIDs and resolves
# their product_compatibility field. Shows exactly which products would be
# visible when "Splunk Cloud" or "Splunk Enterprise" is selected in the UI.
[SCAN - Compatibility Debugger - Platform]
description = Replicates the SCAN UI platform filter logic. Extracts Splunkbase UIDs from each product's addon, app_viz, and app_viz_2 URLs, joins them against the synced Splunkbase catalog, and evaluates platform compatibility (Splunk Cloud vs Enterprise). Shows which products pass the filter and which are excluded, along with the raw compatibility strings. Use this to debug why a product appears or disappears when a platform is selected.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where status!="retired" \
| lookup scan_splunkbase_apps appid AS addon OUTPUT uid AS addon_uid \
| lookup scan_splunkbase_apps appid AS app_viz OUTPUT uid AS viz_uid \
| lookup scan_splunkbase_apps appid AS app_viz_2 OUTPUT uid AS viz2_uid \
| eval addon_uid=if(isnotnull(addon_uid),tostring(addon_uid),null()), viz_uid=if(isnotnull(viz_uid),tostring(viz_uid),null()), viz2_uid=if(isnotnull(viz2_uid),tostring(viz2_uid),null()) \
| eval product_uids=mvappend(addon_uid, viz_uid, viz2_uid) \
| eval product_uids=mvdedup(product_uids) \
| fields title display_name category status addon_label app_viz_label sc4s_supported product_uids \
| mvexpand product_uids \
| join type=left product_uids \
    [| inputlookup scan_splunkbase_apps \
    | rename uid as product_uids \
    | eval product_uids=tostring(product_uids) \
    | fields product_uids title product_compatibility \
    | rename title as splunkbase_title ] \
| eval supports_cloud=if(like(product_compatibility,"%Cloud%"),"✅ Yes","❌ No") \
| eval supports_enterprise=if(like(product_compatibility,"%Enterprise%"),"✅ Yes","❌ No") \
| eval platform_verdict=case( \
    isnull(product_compatibility), "⚠️️ No Splunkbase data", \
    like(product_compatibility,"%Cloud%") AND like(product_compatibility,"%Enterprise%"), "Both", \
    like(product_compatibility,"%Cloud%"), "Cloud only", \
    like(product_compatibility,"%Enterprise%"), "Enterprise only", \
    1==1, "Unknown") \
| eval supports_cloud=if(sc4s_supported=="true","✅ Yes (SC4S)",supports_cloud) \
| eval supports_enterprise=if(sc4s_supported=="true","✅ Yes (SC4S)",supports_enterprise) \
| eval platform_verdict=if(sc4s_supported=="true","Both (SC4S)",platform_verdict) \
| stats \
    values(product_uids) as uids \
    values(splunkbase_title) as splunkbase_apps \
    values(product_compatibility) as raw_compatibility \
    values(supports_cloud) as supports_cloud \
    values(supports_enterprise) as supports_enterprise \
    values(platform_verdict) as platform_verdict \
    latest(sc4s_supported) as sc4s \
    by display_name category status addon_label \
| eval has_uid=if(uids!="","yes","no") \
| eval visible_cloud=if(match(supports_cloud,"Yes"),"✅ Visible","❌ Hidden") \
| eval visible_enterprise=if(match(supports_enterprise,"Yes"),"✅ Visible","❌ Hidden") \
| table display_name category status addon_label uids splunkbase_apps raw_compatibility visible_cloud visible_enterprise platform_verdict sc4s has_uid \
| sort 0 category display_name

### 35. Product ↔ Version Compatibility Debugger  ############################
# For every product, shows which Splunk versions it supports (from its
# Splunkbase UIDs). Replicates the exact filter logic the UI uses when a
# specific version like "9.2" or "9.4" is selected.
[SCAN - Compatibility Debugger - Version]
description = Replicates the SCAN UI version filter logic. Extracts Splunkbase UIDs from each product's addon, app_viz, and app_viz_2 URLs, joins them against the synced Splunkbase catalog, and parses the version_compatibility field. Shows every supported Splunk version per product (filtered to >9.0 like the UI) and whether the product would be visible for each version. Use this to debug why a product appears or disappears when a specific Splunk version is selected.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where status!="retired" \
| lookup scan_splunkbase_apps appid AS addon OUTPUT uid AS addon_uid \
| lookup scan_splunkbase_apps appid AS app_viz OUTPUT uid AS viz_uid \
| lookup scan_splunkbase_apps appid AS app_viz_2 OUTPUT uid AS viz2_uid \
| eval addon_uid=if(isnotnull(addon_uid),tostring(addon_uid),null()), viz_uid=if(isnotnull(viz_uid),tostring(viz_uid),null()), viz2_uid=if(isnotnull(viz2_uid),tostring(viz2_uid),null()) \
| eval product_uids=mvappend(addon_uid, viz_uid, viz2_uid) \
| eval product_uids=mvdedup(product_uids) \
| fields title display_name category status addon_label app_viz_label sc4s_supported product_uids \
| mvexpand product_uids \
| join type=left product_uids \
    [| inputlookup scan_splunkbase_apps \
    | rename uid as product_uids \
    | eval product_uids=tostring(product_uids) \
    | fields product_uids title version_compatibility product_compatibility \
    | rename title as splunkbase_title ] \
| eval raw_versions=version_compatibility \
| eval version_list=split(version_compatibility,"|") \
| eval version_list=mvmap(version_list, trim(version_list)) \
| eval version_list=mvfilter(match(version_list,"^\d+\.\d+")) \
| eval versions_above_9=mvfilter(tonumber(version_list) > 9.0) \
| stats \
    values(product_uids) as uids \
    values(splunkbase_title) as splunkbase_apps \
    values(version_list) as all_versions \
    values(versions_above_9) as versions_above_9 \
    values(raw_versions) as raw_version_compatibility \
    latest(sc4s_supported) as sc4s \
    by display_name category status addon_label \
| eval has_uid=if(uids!="","yes","no") \
| eval version_count=mvcount(versions_above_9) \
| eval latest_version=mvindex(versions_above_9, 0) \
| eval supports_9_1=if(mvfind(all_versions,"^9\.1")>=0 OR sc4s=="true","✅","—") \
| eval supports_9_2=if(mvfind(all_versions,"^9\.2")>=0 OR sc4s=="true","✅","—") \
| eval supports_9_3=if(mvfind(all_versions,"^9\.3")>=0 OR sc4s=="true","✅","—") \
| eval supports_9_4=if(mvfind(all_versions,"^9\.4")>=0 OR sc4s=="true","✅","—") \
| eval supports_10_0=if(mvfind(all_versions,"^10\.0")>=0 OR sc4s=="true","✅","—") \
| table display_name category status addon_label uids splunkbase_apps supports_9_1 supports_9_2 supports_9_3 supports_9_4 supports_10_0 version_count versions_above_9 raw_version_compatibility sc4s has_uid \
| sort 0 category display_name


### 36. Cisco Splunkbase Ecosystem  ##########################################
# All Splunkbase apps belonging to the Cisco ecosystem — filtered by appids
# referenced in products.conf. Covers ~125 apps (53 live + 72 archived).
# Used as the base data source for Ecosystem Intelligence dashboard Tab 2.
[SCAN - Cisco Splunkbase Ecosystem]
description = Returns all Splunkbase catalog entries belonging to the Cisco ecosystem. Filters the synced Splunkbase catalog to only include apps whose appid appears in products.conf as an addon, app_viz, or whose UID appears in legacy_uids or community_uids. Covers approximately 125 apps (53 live + 72 archived). Provides the base dataset for Cisco-focused Splunkbase analytics.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-products \
    | eval folder=mvappend(addon, app_viz, app_viz_2) \
    | eval folder=mvfilter(isnotnull(folder) AND folder!="") \
    | append [| rest splunk_server=local /servicesNS/-/-/configs/conf-products \
        | fields legacy_uids community_uids \
        | eval uid=mvappend(split(legacy_uids,","), split(community_uids,",")) \
        | mvexpand uid \
        | eval uid=trim(uid) \
        | where uid!="" \
        | lookup scan_splunkbase_apps uid OUTPUT appid \
        | where isnotnull(appid) \
        | rename appid as folder \
        | fields folder] \
    | mvexpand folder \
    | eval folder=trim(folder) \
    | where isnotnull(folder) AND folder!="" \
    | dedup folder \
    | rename folder as appid \
    | fields appid \
    | format]
### 37. Add-on Version Support Matrix  #######################################
# Add-on centric view: for each Cisco/Splunk-supported add-on, which Splunk
# versions does it support? Deduplicates by addon folder so each TA appears
# once. Looks up version_compatibility directly — no values() aggregation.
# Used for the "Version Support Analysis" dashboard tab.
[SCAN - Product Version Support Matrix]
description = Add-on centric version compatibility matrix. For each Cisco/Splunk-supported add-on, shows which Splunk versions it supports. Deduplicates by addon folder so each TA appears exactly once with clean version data. Filters to active, cisco_supported or splunk_supported products only.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where status="active" AND support_level IN ("cisco_supported","splunk_supported") AND isnotnull(addon) \
| dedup addon \
| fields addon addon_label addon_family \
| lookup scan_splunkbase_apps appid AS addon OUTPUT version_compatibility, app_version \
| where isnotnull(version_compatibility) \
| eval versions=split(version_compatibility,"|") \
| eval versions=mvmap(versions, trim(versions)) \
| eval versions=mvfilter(match(versions,"^\d+\.\d+")) \
| eval supported_version_count=mvcount(versions) \
| eval supports_10_4=if(mvfind(versions,"^10\.4")>=0,"✅ YES","— NO") \
| eval supports_10_3=if(mvfind(versions,"^10\.3")>=0,"✅ YES","— NO") \
| eval supports_10_2=if(mvfind(versions,"^10\.2")>=0,"✅ YES","— NO") \
| eval supports_10_1=if(mvfind(versions,"^10\.1")>=0,"✅ YES","— NO") \
| eval supports_10_0=if(mvfind(versions,"^10\.0")>=0,"✅ YES","— NO") \
| eval supports_9_4=if(mvfind(versions,"^9\.4")>=0,"✅ YES","— NO") \
| eval supports_9_3=if(mvfind(versions,"^9\.3")>=0,"✅ YES","— NO") \
| eval supports_9_2=if(mvfind(versions,"^9\.2")>=0,"✅ YES","— NO") \
| eval all_supported_versions=mvjoin(versions, ", ") \
| table addon_label addon_family app_version supports_10_4 supports_10_3 supports_10_2 supports_10_1 supports_10_0 supports_9_4 supports_9_3 supports_9_2 supported_version_count all_supported_versions \
| rename addon_label as "Add-on", addon_family as "Family", app_version as "Version" \
| sort 0 "Add-on"

### 38. Add-ons WITHOUT Version Support (Coverage Gap Analysis)  ##############
# Gap analysis: Which Cisco/Splunk-supported add-ons do NOT support a specific
# Splunk version? Shows coverage gaps per add-on — useful for identifying TAs
# that need urgent updates before a Splunk upgrade.
[SCAN - Products WITHOUT Version Support]
description = Coverage gap analysis from an add-on perspective. For active, Cisco/Splunk-supported add-ons, shows which Splunk versions are NOT supported. Surfaces add-ons that need version updates before upgrading the Splunk environment.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where status="active" AND support_level IN ("cisco_supported","splunk_supported") AND isnotnull(addon) \
| dedup addon \
| fields addon addon_label addon_family \
| lookup scan_splunkbase_apps appid AS addon OUTPUT version_compatibility, app_version \
| where isnotnull(version_compatibility) \
| eval versions=split(version_compatibility,"|") \
| eval versions=mvmap(versions, trim(versions)) \
| eval versions=mvfilter(match(versions,"^\d+\.\d+")) \
| eval all_supported_versions=mvjoin(versions, ", ") \
| eval latest_supported=mvindex(versions, 0) \
| eval gap_10_4=if(mvfind(versions,"^10\.4")>=0,0,1) \
| eval gap_10_3=if(mvfind(versions,"^10\.3")>=0,0,1) \
| eval gap_10_2=if(mvfind(versions,"^10\.2")>=0,0,1) \
| eval gap_10_1=if(mvfind(versions,"^10\.1")>=0,0,1) \
| eval gap_10_0=if(mvfind(versions,"^10\.0")>=0,0,1) \
| eval gap_9_4=if(mvfind(versions,"^9\.4")>=0,0,1) \
| eval gap_9_3=if(mvfind(versions,"^9\.3")>=0,0,1) \
| eval gap_9_2=if(mvfind(versions,"^9\.2")>=0,0,1) \
| eval total_gaps=gap_10_4+gap_10_3+gap_10_2+gap_10_1+gap_10_0+gap_9_4+gap_9_3+gap_9_2 \
| where total_gaps > 0 \
| table addon_label addon_family app_version latest_supported total_gaps all_supported_versions \
| rename addon_label as "Add-on", addon_family as "Family", app_version as "Version", latest_supported as "Latest Supported", total_gaps as "Missing Versions", all_supported_versions as "Supported Versions" \
| sort 0 - "Missing Versions" "Add-on"

### 39. Magic Eight Audit  ###################################################
# Environment-first: queries props.conf across the indexer tier for all
# sourcetypes and checks 8 best-practice settings. Enriches with products.conf
# for Cisco product context. Supports $scope$ parameter.
[SCAN - Magic Eight Audit]
description = Audits props.conf across Splunk servers for 8 best-practice settings. Includes sourcetype, source, and host stanzas with a Stanza Type column. REST returns effective merged config (like btool) but does not trace which file each setting came from. Supports $scope$: local, environment, or all.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=* /servicesNS/-/-/configs/conf-props \
    f=title f=eai:acl* f=SOURCETYPE f=sourcetype f=SHOULD_LINEMERGE f=LINE_BREAKER f=TRUNCATE \
    f=TIME_FORMAT f=TIME_PREFIX f=MAX_TIMESTAMP_LOOKAHEAD \
    f=ANNOTATE_PUNCT f=LEARN_SOURCETYPE \
| rename title as stanza, eai:acl.app as app \
| search NOT app IN (system,SplunkDeploymentServerConfig,learned,Splunk_SA_CIM,python_upgrade_readiness_app,splunk_instrumentation,splunk_internal_metrics,splunk_monitoring_console,splunk_secure_gateway) \
| eval SOURCETYPE=coalesce(SOURCETYPE, sourcetype) \
| eval stanza_type=case(match(stanza,"^source::"), "source", match(stanza,"^host::"), "host", 1=1, "sourcetype") \
| join type=left splunk_server \
    [| rest splunk_server=local /services/server/info f=splunk_server \
    | eval is_local=1 | fields splunk_server is_local] \
| eval is_local=if(isnotnull(is_local),1,0) \
| where case("$scope$"="local", is_local=1, "$scope$"="environment", is_local=0, 1=1, 1=1) \
| stats values(SHOULD_LINEMERGE) as SHOULD_LINEMERGE \
    values(LINE_BREAKER) as LINE_BREAKER \
    values(TRUNCATE) as TRUNCATE \
    values(TIME_FORMAT) as TIME_FORMAT \
    values(TIME_PREFIX) as TIME_PREFIX \
    values(MAX_TIMESTAMP_LOOKAHEAD) as MAX_TIMESTAMP_LOOKAHEAD \
    values(ANNOTATE_PUNCT) as ANNOTATE_PUNCT \
    values(LEARN_SOURCETYPE) as LEARN_SOURCETYPE \
    values(SOURCETYPE) as SOURCETYPE values(app) as app \
    first(stanza_type) as stanza_type by stanza \
| eval SOURCETYPE=mvindex(SOURCETYPE,0) \
| eval stream_id=case((stanza_type=="source" OR stanza_type=="host") AND isnotnull(SOURCETYPE) AND trim(SOURCETYPE)!="", SOURCETYPE, 1=1, stanza) \
| eval _order=case(stanza_type=="host", 0, stanza_type=="source", 1, 1=1, 2) \
| sort 0 _order stream_id stanza \
| stats first(stanza) as stanza first(stanza_type) as stanza_type first(SOURCETYPE) as SOURCETYPE first(SHOULD_LINEMERGE) as SHOULD_LINEMERGE first(LINE_BREAKER) as LINE_BREAKER first(TRUNCATE) as TRUNCATE first(TIME_FORMAT) as TIME_FORMAT first(TIME_PREFIX) as TIME_PREFIX first(MAX_TIMESTAMP_LOOKAHEAD) as MAX_TIMESTAMP_LOOKAHEAD first(ANNOTATE_PUNCT) as ANNOTATE_PUNCT first(LEARN_SOURCETYPE) as LEARN_SOURCETYPE first(app) as app by stream_id \
| eval Sourcetype=stream_id \
| eval Source=if(stanza_type=="source" OR stanza_type=="host", stanza, "—") \
| eval SHOULD_LINEMERGE=case(isnotnull(SHOULD_LINEMERGE) AND (SHOULD_LINEMERGE="false" OR SHOULD_LINEMERGE="0"), "✅ false", isnotnull(SHOULD_LINEMERGE), "⚠️ default (".SHOULD_LINEMERGE.")", 1=1, "⛔ missing") \
| eval LINE_BREAKER=if(isnotnull(LINE_BREAKER), "✅ set", "⛔ missing") \
| eval TRUNCATE=if(isnotnull(TRUNCATE), TRUNCATE, "⛔ missing") \
| eval TIME_FORMAT=if(isnotnull(TIME_FORMAT), "✅ set", "⛔ missing") \
| eval TIME_PREFIX=if(isnotnull(TIME_PREFIX), "✅ set", "⛔ missing") \
| eval MAX_TIMESTAMP_LOOKAHEAD=if(isnotnull(MAX_TIMESTAMP_LOOKAHEAD), MAX_TIMESTAMP_LOOKAHEAD, "⛔ missing") \
| eval ANNOTATE_PUNCT=case(isnotnull(ANNOTATE_PUNCT) AND (ANNOTATE_PUNCT="false" OR ANNOTATE_PUNCT="0"), "✅ false", isnotnull(ANNOTATE_PUNCT), "⚠️ default (".ANNOTATE_PUNCT.")", 1=1, "⛔ missing") \
| eval LEARN_SOURCETYPE=case(isnotnull(LEARN_SOURCETYPE) AND (LEARN_SOURCETYPE="false" OR LEARN_SOURCETYPE="0"), "✅ false", isnotnull(LEARN_SOURCETYPE), "⚠️ default (".LEARN_SOURCETYPE.")", 1=1, "⛔ missing") \
| eval magic_eight_count=0 \
| eval magic_eight_count=magic_eight_count+if(match(SHOULD_LINEMERGE,"^✅"),1,0) \
| eval magic_eight_count=magic_eight_count+if(LINE_BREAKER!="⛔ missing",1,0) \
| eval magic_eight_count=magic_eight_count+if(TRUNCATE!="⛔ missing",1,0) \
| eval magic_eight_count=magic_eight_count+if(TIME_FORMAT!="⛔ missing",1,0) \
| eval magic_eight_count=magic_eight_count+if(TIME_PREFIX!="⛔ missing",1,0) \
| eval magic_eight_count=magic_eight_count+if(MAX_TIMESTAMP_LOOKAHEAD!="⛔ missing",1,0) \
| eval magic_eight_count=magic_eight_count+if(match(ANNOTATE_PUNCT,"^✅"),1,0) \
| eval magic_eight_count=magic_eight_count+if(match(LEARN_SOURCETYPE,"^✅"),1,0) \
| eval score=magic_eight_count."/8" \
| eval grade=case(magic_eight_count==8,"Complete",magic_eight_count>=5,"Partial",magic_eight_count>=1,"Minimal",1==1,"None") \
| rename stanza as Stanza, stanza_type as "Stanza Type", app as "Defining App(s)" \
| search NOT Sourcetype IN (scheduler,splunk_web_service,splunkd) \
| table Sourcetype Source Stanza "Stanza Type" "Defining App(s)" SHOULD_LINEMERGE LINE_BREAKER TRUNCATE TIME_FORMAT TIME_PREFIX MAX_TIMESTAMP_LOOKAHEAD ANNOTATE_PUNCT LEARN_SOURCETYPE magic_eight_count score grade \
| sort 0 grade Sourcetype Stanza

##############################################################################
# SCAN — Environment Audit
# These searches focus on what is INSTALLED on this Splunk instance and
# cross-reference against the Splunkbase catalog to surface operational
# risks: archived apps still running, version drift, disabled apps, etc.
##############################################################################

### 40. Environment Health Summary  ############################################
# One-row rollup of installed Cisco app health: counts of archived, outdated,
# disabled, and healthy apps. Powers the Environment Audit dashboard tab KPIs.
[SCAN - Environment Health Summary]
description = Cross-references every locally installed Splunk app against the Cisco Splunkbase catalog and produces a single-row summary of environment health: total Cisco apps installed, how many are archived on Splunkbase, how many have version mismatches, how many are disabled, and how many are healthy. Powers the Environment Audit tab KPIs.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /services/apps/local \
| where core=0 \
| rename title as appid, label as installed_name \
| eval installed_version=version \
| fields appid installed_name installed_version disabled \
| join type=left appid \
    [| inputlookup scan_splunkbase_apps \
    | fields appid uid title type support is_archived archive_status app_version categories] \
| where isnotnull(uid) \
| eval is_archived_flag=if(is_archived=="true" OR archive_status IN ("archived","archived_manually"), 1, 0) \
| eval is_outdated=if(is_archived_flag==0 AND installed_version!=app_version, 1, 0) \
| eval is_disabled=if(disabled=="1", 1, 0) \
| eval is_healthy=if(is_archived_flag==0 AND is_outdated==0 AND is_disabled==0, 1, 0) \
| stats count as total_installed \
    sum(is_archived_flag) as archived \
    sum(is_outdated) as outdated \
    sum(is_disabled) as disabled_apps \
    sum(is_healthy) as healthy

##############################################################################
# SCAN — Command logs (synclookup, synccatalog)
# Use these to troubleshoot sync jobs and inspect command output.
##############################################################################

### 41. Command Logs  ########################################################
# Recent log entries from SCAN custom search commands (synclookup, synccatalog).
[SCAN - Command Logs]
description = Shows recent log entries from SCAN custom commands: synclookup (Splunkbase lookup sync) and synccatalog (products.conf catalog sync from S3). Use to troubleshoot sync jobs, verify run times, and inspect status or error messages.
dispatch.earliest_time = -24h
dispatch.latest_time = now
search = index=_internal (sourcetype=scan:synclookup:log OR sourcetype=scan:synccatalog:log) \
| eval command=replace(sourcetype, "scan:([^:]+):log", "\1") \
| table _time command log_level logger_name message host source \
| sort 0 - _time

### 42. Cisco Splunkbase Apps (Detailed)  ######################################
# Detailed view of all Cisco-related, non-archived apps from Splunkbase with
# vendor support (cisco or splunk). Includes compliance and validation fields.
[SCAN - Cisco Splunkbase Apps Detailed]
description = Lists all non-archived Cisco-titled apps and add-ons from the scan_splunkbase_apps lookup that are Cisco-supported or Splunk-supported. Includes compliance fields (FedRAMP, FIPS, AppInspect) and formatted timestamps for update and publish dates.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search title=*cisco* is_archived=false support IN (cisco,splunk) type!=connector \
| convert ctime(updated_time) , ctime(published_time) \
| eval cloud=if(like(product_compatibility,"%Cloud%"),"yes","no") \
| eval pkg_size_mb=if(isnotnull(size) AND size!="",round(tonumber(size)/1048576,1),null()) \
| table uid appid title type app_version support cloud pkg_size_mb filename updated_time published_time fedramp_validation appinspect_status fips_compatibility is_archived passed_validation product_compatibility version_compatibility appinspect_passed

### 43. Release History Explorer  ##############################################
# Browse version history and release notes for every live app/addon.
[SCAN - Release History Explorer]
description = Expands the release_history JSON array for every live, non-archived app and add-on. Shows each version alongside its truncated release notes. Use to track what changed across releases, search for specific keywords in release notes (e.g. "python 3", "breaking change"), or audit release cadence.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup scan_splunkbase_apps \
| search is_archived=false type IN ("app","addon") release_history!="" \
| spath input=release_history path="{}.version" output=versions \
| spath input=release_history path="{}.release_notes" output=notes \
| eval release=mvzip(versions, notes, "|||") \
| mvexpand release \
| rex field=release "^(?<version>[^|]+)\|\|\|(?<release_notes>.*)" \
| eval release_count=mvcount(versions) \
| table title type support app_version version release_count release_notes \
| sort 0 title version
