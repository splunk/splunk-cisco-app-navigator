##############################################################################
# SCAN — Ad-hoc / Troubleshooting Saved Searches
# Run these from the Search bar or Saved Searches page to inspect the
# product catalog, audit data quality, and troubleshoot in the field.
##############################################################################

###  1. Full Catalog Dump  ###################################################
# Every field from products.conf in one table. Good starting point.
[SCAN - Product Catalog - Full Dump]
description = Dumps every field from products.conf into a single table. Use this as a starting point for inspecting the full Cisco product catalog, including add-on families, SOAR connectors, alert actions, legacy apps, sourcetypes, and sort order.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| fields app title display_name description value_proposition vendor tagline \
    category version status \
    addon addon_label addon_family addon_splunkbase_url addon_docs_url addon_install_url \
    app_viz app_viz_label app_viz_splunkbase_url app_viz_docs_url app_viz_install_url \
    app_viz_2 app_viz_2_label app_viz_2_splunkbase_url app_viz_2_docs_url app_viz_2_install_url \
    learn_more_url \
    legacy_apps legacy_labels legacy_uids legacy_urls \
    prereq_apps prereq_labels prereq_uids prereq_urls \
    community_apps community_labels community_uids community_urls \
    soar_connector_label soar_connector_uid soar_connector_url \
    soar_connector_2_label soar_connector_2_uid soar_connector_2_url \
    soar_connector_3_label soar_connector_3_uid soar_connector_3_url \
    alert_action_label alert_action_uid alert_action_url \
    alert_action_2_label alert_action_2_uid alert_action_2_url \
    sourcetypes dashboards custom_dashboard \
    aliases keywords icon_emoji sort_order disabled \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| sort 0 +sort_order \
| table title display_name category status addon_family addon_label app_viz_label app_viz_2_label \
    soar_connector_label soar_connector_2_label soar_connector_3_label \
    alert_action_label alert_action_2_label community_labels aliases legacy_labels sourcetypes sort_order

###  2. Category Summary  ####################################################
# Product counts by category and status — quick health check.
[SCAN - Product Catalog - By Category]
description = Summarizes product counts by category (Security, Networking, Collaboration, Observability, Deprecated) and shows active, deprecated, and coming-soon breakdowns. Quick health check for catalog completeness.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| stats count as total \
    dc(eval(if(status=="active",title,null()))) as active \
    dc(eval(if(status=="deprecated",title,null()))) as deprecated \
    dc(eval(if(status=="under_development",title,null()))) as coming_soon \
    values(eval(if(status=="active",display_name,null()))) as products \
    by category \
| sort - total

###  3. Add-on Family Summary  ###############################################
# Group products by addon_family to see install-flow groupings.
[SCAN - Product Catalog - By Add-on Family]
description = Groups products by their add-on family (e.g. security-cloud, catalyst, collaboration). Shows which products share the same Splunk add-on and helps plan consolidated installations.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| stats count as product_count \
    values(display_name) as products \
    values(addon_label) as addon_labels \
    by addon_family \
| sort - product_count

###  4. SOAR Connector Inventory  ############################################
# Products with SOAR connectors — shows connector labels and Splunkbase UIDs.
[SCAN - SOAR Connector Inventory]
description = Lists every product that has one or more Splunk SOAR connectors available, with connector names, Splunkbase IDs, and download URLs. Use this to identify SOAR automation opportunities across your Cisco estate.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(soar_connector_label) \
| eval connectors=mvappend( \
    soar_connector_label." (#".soar_connector_uid.")", \
    if(isnotnull(soar_connector_2), soar_connector_2_label." (#".soar_connector_2_uid.")", null()), \
    if(isnotnull(soar_connector_3), soar_connector_3_label." (#".soar_connector_3_uid.")", null()) \
    ) \
| eval connector_count=mvcount(connectors) \
| table display_name category connector_count connectors soar_connector_url soar_connector_2_url soar_connector_3_url \
| sort 0 - connector_count display_name

###  5. Legacy App Inventory  ################################################
# Expand every legacy app per product — useful for migration planning.
[SCAN - Legacy App Inventory]
description = Expands every legacy (deprecated/archived) add-on per product into individual rows with app IDs, labels, Splunkbase UIDs, and URLs. Essential for migration planning — identify which old TAs need to be replaced by the current add-on.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(legacy_apps) \
| eval legacy_app=split(legacy_apps,","), legacy_label=split(legacy_labels,","), legacy_uid=split(legacy_uids,","), legacy_url=split(legacy_urls,",") \
| eval rows=mvrange(0,mvcount(legacy_app)) \
| mvexpand rows \
| eval legacy_app=mvindex(legacy_app,rows), legacy_label=mvindex(legacy_label,rows), legacy_uid=mvindex(legacy_uid,rows), legacy_url=mvindex(legacy_url,rows) \
| table display_name category addon_label legacy_app legacy_label legacy_uid legacy_url \
| sort 0 display_name legacy_uid

###  6. Sourcetype Coverage  #################################################
# All sourcetypes across all products — find overlaps or gaps.
[SCAN - Sourcetype Coverage]
description = Lists every sourcetype tracked across all products and shows which products share each sourcetype. Useful for detecting overlaps (multiple products ingesting the same data) and finding gaps in sourcetype coverage.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(sourcetypes) \
| eval sourcetype=split(sourcetypes,",") \
| mvexpand sourcetype \
| eval sourcetype=trim(sourcetype) \
| stats values(display_name) as products dc(display_name) as product_count by sourcetype \
| sort 0 - product_count sourcetype

###  7. Missing Fields Audit  ################################################
# Find products with missing critical fields — data quality check.
[SCAN - Data Quality - Missing Fields Audit]
description = Identifies products with missing critical fields such as sourcetypes, descriptions, keywords, learn_more_url, addon URLs, icons, or dashboards. Run this after catalog edits to catch data quality issues before they reach customers.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval missing=mvappend( \
    if(isnull(sourcetypes),"sourcetypes",null()), \
    if(isnull(learn_more_url),"learn_more_url",null()), \
    if(isnull(keywords),"keywords",null()), \
    if(isnull(description),"description",null()), \
    if(isnull(addon_splunkbase_url),"addon_splunkbase_url",null()), \
    if(isnull(addon_install_url),"addon_install_url",null()), \
    if(isnull(icon_emoji),"icon_emoji",null()), \
    if(isnull(dashboards),"dashboards",null()) \
    ) \
| where isnotnull(missing) \
| eval missing_count=mvcount(missing) \
| table display_name category status missing_count missing \
| sort 0 - missing_count display_name

###  8. Products with Prerequisites  #########################################
# Products that require companion apps (e.g. Splunk Stream).
[SCAN - Products with Prerequisites]
description = Shows products that require companion apps (e.g. Splunk Add-on for Stream Forwarders, Splunk App for Stream) to be installed before they can ingest data. Helps admins prepare their environment before onboarding a new Cisco product.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(prereq_apps) \
| table display_name category addon_label prereq_labels prereq_apps prereq_uids

###  9. Installed Apps vs Catalog  ###########################################
# Cross-reference locally installed apps against addon and legacy_apps fields.
# Shows which products have their add-on installed and which legacy TAs are
# still present — critical for migration troubleshooting.
[SCAN - Installed Apps vs Catalog]
description = Cross-references locally installed Splunk apps against the product catalog's addon and legacy_apps fields. Shows which products have their current add-on installed and flags any legacy TAs still present — critical for migration troubleshooting.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| fields title display_name category status addon addon_label legacy_apps legacy_labels \
| join type=left addon \
    [| rest splunk_server=local /services/apps/local \
     | rename title as installed_addon_name, label as installed_label \
     | eval addon=installed_addon_name \
     | fields addon installed_label \
     | dedup addon ] \
| eval addon_installed=if(isnotnull(installed_label),"YES","no") \
| eval legacy_app_list=split(legacy_apps,",") \
| eval legacy_label_list=split(legacy_labels,",") \
| eval legacy_detected=mvmap(legacy_app_list, legacy_app_list) \
| join type=left legacy_detected \
    [| rest splunk_server=local /services/apps/local \
     | rename title as legacy_detected \
     | fields legacy_detected \
     | dedup legacy_detected ] \
| table display_name category status addon_label addon_installed legacy_labels \
| sort 0 category display_name

### 10. CSV ↔ products.conf Gap Analysis  ####################################
# Cross-reference cisco_apps.csv with products.conf to find CSV rows
# that don't map to any product stanza (by folder name / appid).
[SCAN - Gap Analysis - CSV vs Catalog]
description = Cross-references the cisco_apps.csv lookup (master Splunkbase inventory) against products.conf to find live, non-archived CSV rows whose appid doesn't appear as any addon, app_viz, legacy_apps, or prereq_apps in a product stanza. Includes hand-curated Supported_Cisco_Products for context. Surfaces apps that may need to be added to the catalog or mapped to an existing product.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false archive_status!=flagged type IN ("app","addon") \
| table uid appid title type support display_name app_version sourcetypes Supported_Cisco_Products_Zipped Cisco_App_Class \
| join type=left appid \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-products \
    | rename eai:acl.app as app \
    | fields addon app_viz app_viz_2 legacy_apps prereq_apps community_apps \
    | eval folder=mvappend(addon, app_viz, app_viz_2, legacy_apps, prereq_apps, community_apps) \
    | mvexpand folder \
    | dedup folder \
    | eval found=1 \
    | rename folder as appid \
    | fields appid found ] \
| where isnull(found)

### 11. Ecosystem Summary  ###################################################
# One-row rollup of the entire catalog: total products, categories, add-on
# families, legacy apps, SOAR connectors, sourcetypes, alert actions.
[SCAN - Ecosystem Summary]
description = One-row rollup of the entire Cisco-Splunk ecosystem: total products, categories, add-on families, active/deprecated/coming-soon counts, legacy apps, sourcetypes, SOAR connectors, prerequisite apps, visualization apps, and alert actions. The executive dashboard for catalog health.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval legacy_count=if(isnotnull(legacy_apps),mvcount(split(legacy_apps,",")),0) \
| eval sourcetype_count=if(isnotnull(sourcetypes),mvcount(split(sourcetypes,",")),0) \
| eval has_soar=if(isnotnull(soar_connector_label),1,0) \
| eval has_prereqs=if(isnotnull(prereq_apps),1,0) \
| eval has_viz=if(isnotnull(app_viz),1,0) \
| eval has_alert=if(isnotnull(alert_action_label),1,0) \
| eval has_community=if(isnotnull(community_apps),1,0) \
| stats dc(title) as total_products \
    dc(category) as categories \
    dc(addon_family) as addon_families \
    dc(eval(if(status=="active",title,null()))) as active \
    dc(eval(if(status=="deprecated",title,null()))) as deprecated \
    dc(eval(if(status=="under_development",title,null()))) as coming_soon \
    sum(legacy_count) as total_legacy_apps \
    sum(sourcetype_count) as total_sourcetypes \
    sum(has_soar) as products_with_soar \
    sum(has_prereqs) as products_with_prereqs \
    sum(has_viz) as products_with_viz_app \
    sum(has_alert) as products_with_alert_action \
    sum(has_community) as products_with_community_alt


##############################################################################
# SCAN — CSV-Powered Searches (cisco_apps.csv from Splunkbase API)
# These searches leverage the full Splunkbase export (174 apps, 38 fields)
# for ecosystem intelligence, version tracking, and deployment readiness.
##############################################################################

### 12. Splunkbase Ecosystem Overview  #######################################
# Full dump of the cisco_apps.csv lookup — browse every app/addon/connector.
[SCAN - CSV - Splunkbase Ecosystem Overview]
description = Full dump of the cisco_apps.csv Splunkbase export. Shows every Cisco-related app, add-on, and SOAR connector with key metadata: support level, version, archive status, Splunk platform compatibility, and last update date.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| eval updated_date=strftime(strptime(updated_time,"%m/%d/%Y %H:%M:%S.%6N"),"%Y-%m-%d") \
| table uid appid title type support app_version is_archived archive_status product_compatibility updated_date download_count rating \
| sort 0 type support title

### 13. Support Level Distribution  ##########################################
# Breakdown of apps by support level and type — cisco vs splunk vs developer.
[SCAN - CSV - Support Level Distribution]
description = Breaks down the Splunkbase ecosystem by support level (cisco, splunk, developer, not_supported) and app type (app, addon, connector). Shows counts and lists of apps in each tier.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| stats count as total \
    dc(eval(if(type=="app",appid,null()))) as apps \
    dc(eval(if(type=="addon",appid,null()))) as addons \
    dc(eval(if(type=="connector",appid,null()))) as connectors \
    values(eval(if(is_archived=="false",title,null()))) as live_apps \
    by support \
| sort 0 - total

### 14. Version & Update Tracker  ############################################
# Identify stale or recently updated apps — sorted by last update date.
[SCAN - CSV - Version and Update Tracker]
description = Shows every live (non-archived) app sorted by last update date. Highlights stale apps that haven't been updated recently and freshly updated ones. Useful for tracking Splunkbase release cadence across the Cisco portfolio.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false \
| eval updated_epoch=strptime(updated_time,"%m/%d/%Y %H:%M:%S.%6N") \
| eval days_since_update=round((now()-updated_epoch)/86400) \
| eval staleness=case(days_since_update<=90,"fresh",days_since_update<=365,"current",days_since_update<=730,"aging",1==1,"stale") \
| table title type support app_version days_since_update staleness updated_time \
| sort 0 - days_since_update

### 15. Cloud vs Enterprise Compatibility  ###################################
# Which apps support Splunk Cloud, Enterprise, or both?
[SCAN - CSV - Platform Compatibility Matrix]
description = Maps every live app to its supported Splunk platforms (Cloud, Enterprise, or both). Helps Splunk Cloud admins identify which Cisco apps are available on their platform and which are Enterprise-only.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| eval supports_cloud=if(like(product_compatibility,"%Cloud%"),"yes","no") \
| eval supports_enterprise=if(like(product_compatibility,"%Enterprise%"),"yes","no") \
| eval platform_support=case(supports_cloud=="yes" AND supports_enterprise=="yes","both",supports_cloud=="yes","cloud_only",supports_enterprise=="yes","enterprise_only",1==1,"unknown") \
| stats count by platform_support \
| append [| inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| eval supports_cloud=if(like(product_compatibility,"%Cloud%"),"yes","no") \
| eval platform_support=case(supports_cloud=="yes","cloud_compatible",1==1,"enterprise_only") \
| stats values(title) as apps count by platform_support ]

### 16. Deployment Readiness  ################################################
# Install method support across apps — single, distributed, cloud.
[SCAN - CSV - Deployment Readiness]
description = Shows the install method support for each live app — whether it can be installed via single-instance, distributed (cluster), or cloud self-service. Apps marked 'rejected' for a method cannot be deployed that way.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| table title type support install_method_single install_method_distributed install_method_cloud app_version \
| sort 0 type support title

### 17. CIM Compatibility Report  ############################################
# Which apps declare CIM compatibility?
[SCAN - CSV - CIM Compatibility Report]
description = Lists apps that declare Common Information Model (CIM) compatibility, showing which CIM versions they support and their associated CIM tags. Essential for Enterprise Security and data model acceleration planning.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false cim_compatibility!="" \
| table title type support cim_compatibility cim_tags app_version \
| sort 0 type title

### 18. FedRAMP & FIPS Compliance  ###########################################
# Identify apps with FedRAMP validation or FIPS compatibility flags.
[SCAN - CSV - Compliance Status (FedRAMP and FIPS)]
description = Shows the FedRAMP validation and FIPS compatibility status for each live app. Critical for GovCloud and regulated-environment customers who need to validate their Cisco Splunk stack meets compliance requirements.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| table title type support fedramp_validation fips_compatibility app_version \
| sort 0 support title

### 19. Archived / Superseded Apps  ##########################################
# All archived apps — useful for migration planning and cleanup.
[SCAN - CSV - Archived App Inventory]
description = Lists every archived or deprecated app in the Splunkbase export with its replacement UID (from the hand-curated Replacement field), deprecation flag, and Supported Cisco Products. Essential for identifying old TAs that customers may still have installed and need to migrate off of.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=true OR archive_status IN ("archived","archived_manually") \
| eval updated_date=strftime(strptime(updated_time,"%m/%d/%Y %H:%M:%S.%6N"),"%Y-%m-%d") \
| table uid appid title type support archive_status Deprecated Replacement Supported_Cisco_Products_Zipped app_version updated_date \
| sort 0 type title

### 20. Splunk Version Compatibility Matrix  #################################
# Which Splunk versions does each app support?
[SCAN - CSV - Splunk Version Compatibility]
description = Maps every live app to the Splunk Enterprise/Cloud versions it supports. Helps admins planning upgrades confirm that their Cisco apps will remain compatible with the target Splunk version.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") version_compatibility!="" \
| eval splunk_versions=split(version_compatibility,"|") \
| table title type support version_compatibility app_version \
| sort 0 type title

### 21. Download Popularity Ranking  #########################################
# Top apps by download count — community adopti on signal.
[SCAN - CSV - Download Popularity Ranking]
description = Ranks all live Cisco Splunkbase apps by download count. Shows community adoption and popularity across the ecosystem. Useful for identifying the most widely deployed integrations.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| eval downloads=tonumber(download_count) \
| table title type support downloads rating app_version \
| sort 0 - downloads

### 22. Sourcetype Cross-Reference  ##########################################
# Compare sourcetypes declared in CSV vs products.conf — find mismatches.
[SCAN - CSV - Sourcetype Cross-Reference]
description = Cross-references sourcetypes declared in the Splunkbase CSV against sourcetypes configured in products.conf for each product's addon and app_viz. Helps identify sourcetypes that should be added to product stanzas or that have drifted between the CSV and the catalog.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(addon) \
| eval conf_sourcetypes=sourcetypes \
| fields display_name addon conf_sourcetypes \
| join type=left addon \
    [| inputlookup cisco_apps \
    | rename appid as addon, sourcetypes as csv_sourcetypes \
    | fields addon csv_sourcetypes ] \
| where isnotnull(csv_sourcetypes) AND isnotnull(conf_sourcetypes) \
| eval csv_st=split(csv_sourcetypes,"|"), conf_st=split(conf_sourcetypes,",") \
| eval conf_st=mvmap(conf_st, trim(conf_st)) \
| eval in_csv_not_conf=mvfilter(NOT match(csv_st, "^$")), in_conf_not_csv=mvfilter(NOT match(conf_st, "^$")) \
| eval in_csv_not_conf=mvfilter(NOT match(csv_st, "conf_st")) \
| table display_name addon csv_sourcetypes conf_sourcetypes \
| sort 0 display_name


##############################################################################
# SCAN — All Apps & Add-ons Involved (Full Relationship Map)
##############################################################################

### 23. All Apps & Add-ons Involved  #########################################
# Comprehensive view of EVERY app/add-on referenced per product — addons,
# viz apps, legacy apps, prereqs, community apps, SOAR connectors, alert actions.
[SCAN - All Apps and Add-ons Involved]
description = Shows every Splunk app and add-on referenced by each product in the catalog — primary add-on, visualization apps, legacy/deprecated TAs, prerequisite apps, community alternatives, SOAR connectors, and alert actions. Provides the complete dependency map for each Cisco product.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval addon_info=if(isnotnull(addon), addon." → ".addon_label, null()) \
| eval viz_info=mvappend( \
    if(isnotnull(app_viz), app_viz." → ".app_viz_label, null()), \
    if(isnotnull(app_viz_2), app_viz_2." → ".app_viz_2_label, null()) \
    ) \
| eval legacy_info=if(isnotnull(legacy_apps), legacy_labels, null()) \
| eval prereq_info=if(isnotnull(prereq_apps), prereq_labels, null()) \
| eval community_info=if(isnotnull(community_apps), community_labels, null()) \
| eval soar_info=mvappend( \
    soar_connector_label, soar_connector_2_label, soar_connector_3_label \
    ) \
| eval alert_info=mvappend( \
    alert_action_label, alert_action_2_label \
    ) \
| eval total_apps = 0 \
    + if(isnotnull(addon), 1, 0) \
    + if(isnotnull(app_viz), 1, 0) \
    + if(isnotnull(app_viz_2), 1, 0) \
    + if(isnotnull(legacy_apps), mvcount(split(legacy_apps,",")), 0) \
    + if(isnotnull(prereq_apps), mvcount(split(prereq_apps,",")), 0) \
    + if(isnotnull(community_apps), mvcount(split(community_apps,",")), 0) \
    + mvcount(soar_info) \
    + mvcount(alert_info) \
| table display_name category addon_family total_apps addon_info viz_info legacy_info prereq_info community_info soar_info alert_info \
| sort 0 - total_apps display_name

### 24. CSV — Cisco Category Breakdown  ######################################
# Distribution of apps across Cisco business categories.
[SCAN - CSV - Cisco Category Breakdown]
description = Groups all Splunkbase apps by their Cisco business category (Security, Networking, Collaboration, Observability, etc.) and sub-category. Shows the breadth of the Cisco-Splunk ecosystem per business domain.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false \
| stats count as total \
    values(title) as apps \
    dc(eval(if(type=="addon",appid,null()))) as addons \
    dc(eval(if(type=="app",appid,null()))) as viz_apps \
    by Cisco_Category Cisco_Sub_Category \
| sort 0 Cisco_Category - total

### 25. CSV — Top Rated Apps  ################################################
# Best rated apps by community — signal of quality and reliability.
[SCAN - CSV - Top Rated Apps]
description = Ranks live Cisco apps by community rating (highest first). Helps identify the most trusted and reliable integrations across the ecosystem.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") rating!="" \
| rex field=rating "'average':\s*(?<avg_rating>\d+)" \
| rex field=rating "'count':\s*(?<review_count>\d+)" \
| eval avg_rating=tonumber(avg_rating), review_count=tonumber(review_count) \
| eval downloads=tonumber(download_count) \
| where avg_rating > 0 \
| eval stars=substr("★★★★★",1,avg_rating).substr("☆☆☆☆☆",1,5-avg_rating) \
| table title type support Cisco_Category Cisco_Sub_Category stars avg_rating review_count downloads app_version \
| sort 0 - avg_rating - review_count - downloads

### 26. CSV — App Age Analysis  ##############################################
# How old are these apps? When were they first published vs last updated?
[SCAN - CSV - App Age Analysis]
description = Analyzes the age of each app from first publication to last update. Shows days since creation, days since last update, and active development lifespan. Identifies abandoned or actively maintained apps.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| eval created_epoch=strptime(created_time,"%m/%d/%Y %H:%M:%S.%6N") \
| eval updated_epoch=strptime(updated_time,"%m/%d/%Y %H:%M:%S.%6N") \
| eval published_epoch=strptime(published_time,"%m/%d/%Y %H:%M:%S.%6N") \
| eval days_since_created=round((now()-created_epoch)/86400) \
| eval days_since_updated=round((now()-updated_epoch)/86400) \
| eval active_lifespan_days=round((updated_epoch-created_epoch)/86400) \
| eval created_date=strftime(created_epoch,"%Y-%m-%d") \
| eval updated_date=strftime(updated_epoch,"%Y-%m-%d") \
| eval health=case(days_since_updated<=180,"🟢 Active",days_since_updated<=365,"🟡 Maintained",days_since_updated<=730,"🟠 Aging",1==1,"🔴 Stale") \
| table title type support health days_since_updated active_lifespan_days created_date updated_date app_version Cisco_Category \
| sort 0 - days_since_updated

### 27. CSV — Apps per Support Level + Category Heatmap  #####################
# Cross-tabulate support level × category for a density view.
[SCAN - CSV - Support x Category Heatmap]
description = Cross-tabulates support level (cisco, splunk, developer, community) against Cisco business category. Shows where official Cisco support is concentrated and where gaps exist with only community or third-party support.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| chart count over support by Cisco_Category \
| addtotals fieldname=Total

### 28. CSV — Deprecated App Migration Map  ##################################
# For every deprecated/archived app, show what it should be replaced with.
[SCAN - CSV - Deprecated Migration Map]
description = Shows every deprecated or archived app alongside its recommended replacement (Splunkbase UID), the Cisco products it supported, and the current replacement app's name. Essential for planning TA migrations.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=true OR Deprecated=true OR archive_status IN ("archived","archived_manually") \
| eval replacement_uid=Replacement \
| table uid appid title type support Cisco_Category Cisco_Sub_Category Supported_Cisco_Products_Zipped Deprecated replacement_uid \
| join type=left replacement_uid \
    [| inputlookup cisco_apps \
    | rename uid as replacement_uid, title as replacement_title, appid as replacement_appid \
    | fields replacement_uid replacement_title replacement_appid ] \
| eval migration_path=if(isnotnull(replacement_title), title." → ".replacement_title, title." → (no replacement mapped)") \
| table migration_path title replacement_title Cisco_Category Supported_Cisco_Products_Zipped type support \
| sort 0 Cisco_Category title

### 29. CSV — AppInspect & Validation Status  ################################
# Security validation posture across the ecosystem.
[SCAN - CSV - Validation and AppInspect Status]
description = Shows the AppInspect pass/fail status, validation status, FedRAMP certification, and FIPS compatibility for every live app. Critical for security-conscious environments and Splunk Cloud vetting.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false type IN ("app","addon") \
| eval validation_status=case( \
    passed_validation=="true" AND appinspect_passed=="true", "✅ Fully Validated", \
    passed_validation=="true", "✅ Passed Validation", \
    appinspect_passed=="true", "⚠️ AppInspect Only", \
    1==1, "❌ Not Validated") \
| eval compliance=mvappend( \
    if(fedramp_validation=="yes","FedRAMP",null()), \
    if(fips_compatibility=="yes","FIPS",null()) \
    ) \
| table title type support validation_status compliance appinspect_status app_version Cisco_Category \
| sort 0 validation_status Cisco_Category title

### 30. CSV — Install Footprint Estimator  ###################################
# How many apps would a customer need for each Cisco product area?
[SCAN - CSV - Install Footprint by Category]
description = Estimates the number of apps, add-ons, and SOAR connectors a customer would need to deploy for each Cisco business category. Helps capacity planning and scope estimation for new Cisco-Splunk deployments.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false \
| stats count as total_apps \
    dc(eval(if(type=="addon",appid,null()))) as addons \
    dc(eval(if(type=="app",appid,null()))) as viz_apps \
    dc(eval(if(type=="connector",appid,null()))) as soar_connectors \
    sum(eval(tonumber(download_count))) as total_downloads \
    avg(eval(tonumber(rating))) as avg_rating \
    by Cisco_Category \
| eval avg_rating=round(avg_rating,1) \
| sort 0 - total_apps

### 31. Installed vs Catalog — Full Estate Audit  ############################
# Cross-reference EVERYTHING installed on this Splunk instance against the CSV.
[SCAN - Installed vs CSV - Full Estate Audit]
description = Cross-references every locally installed app against the cisco_apps.csv Splunkbase inventory. Identifies which installed apps are Cisco-related, their support level, archive status, and whether they are current or deprecated. The definitive audit of your Cisco Splunk footprint.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /services/apps/local \
| rename title as appid, label as installed_name \
| eval installed_version=version \
| fields appid installed_name installed_version disabled \
| join type=left appid \
    [| inputlookup cisco_apps \
    | fields appid uid title type support is_archived Deprecated app_version Cisco_Category Cisco_Sub_Category] \
| where isnotnull(uid) \
| eval version_match=if(installed_version==app_version,"✅ Current","⚠️ ".installed_version." → ".app_version) \
| eval status=case(is_archived=="true","🔴 Archived",Deprecated=="true","🟠 Deprecated",disabled=="1","⚪ Disabled",1==1,"🟢 Active") \
| table appid installed_name status Cisco_Category Cisco_Sub_Category type support version_match installed_version app_version \
| sort 0 status Cisco_Category appid

### 32. CSV — Cisco Products Coverage Matrix  ################################
# Which Cisco hardware/software products are covered by which Splunk apps?
[SCAN - CSV - Cisco Products Coverage Matrix]
description = Parses the Supported_Cisco_Products_Zipped field to show which Cisco hardware and software products are covered by Splunk integrations. Helps identify gaps in coverage for specific Cisco product lines.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps \
| search is_archived=false Supported_Cisco_Products_Zipped!="" \
| eval cisco_product=split(Supported_Cisco_Products_Zipped,"|") \
| mvexpand cisco_product \
| eval cisco_product=trim(cisco_product) \
| where len(cisco_product) > 0 \
| stats values(title) as splunk_apps dc(title) as app_count by cisco_product \
| sort 0 - app_count cisco_product
