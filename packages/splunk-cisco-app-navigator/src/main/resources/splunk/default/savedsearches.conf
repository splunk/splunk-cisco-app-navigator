##############################################################################
# SCAN — Ad-hoc / Troubleshooting Saved Searches
# Run these from the Search bar or Saved Searches page to inspect the
# product catalog, audit data quality, and troubleshoot in the field.
##############################################################################

###  1. Full Catalog Dump  ###################################################
# Every field from products.conf in one table. Good starting point.
[SCAN - Product Catalog - Full Dump]
description = Dumps every field from products.conf into a single table. Use this as a starting point for inspecting the full Cisco product catalog, including add-on families, SOAR connectors, alert actions, legacy apps, sourcetypes, and sort order.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| fields app title display_name description value_proposition vendor tagline \
    category version status \
    addon addon_label addon_family addon_splunkbase_url addon_docs_url addon_install_url \
    app_viz app_viz_label app_viz_splunkbase_url app_viz_docs_url app_viz_install_url \
    app_viz_2 app_viz_2_label app_viz_2_splunkbase_url app_viz_2_docs_url app_viz_2_install_url \
    learn_more_url \
    legacy_apps legacy_labels legacy_uids legacy_urls \
    prereq_apps prereq_labels prereq_uids prereq_urls \
    community_apps community_labels community_uids community_urls \
    soar_connector_label soar_connector_uid soar_connector_url \
    soar_connector_2_label soar_connector_2_uid soar_connector_2_url \
    soar_connector_3_label soar_connector_3_uid soar_connector_3_url \
    alert_action_label alert_action_uid alert_action_url \
    alert_action_2_label alert_action_2_uid alert_action_2_url \
    sourcetypes dashboards custom_dashboard \
    aliases keywords icon_emoji sort_order disabled \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| sort 0 +sort_order \
| table title display_name category status addon_family addon_label app_viz_label app_viz_2_label \
    soar_connector_label soar_connector_2_label soar_connector_3_label \
    alert_action_label alert_action_2_label community_labels aliases legacy_labels sourcetypes sort_order

###  2. Category Summary  ####################################################
# Product counts by category and status — quick health check.
[SCAN - Product Catalog - By Category]
description = Summarizes product counts by category (Security, Networking, Collaboration, Observability, Deprecated) and shows active, deprecated, and coming-soon breakdowns. Quick health check for catalog completeness.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| stats count as total \
    dc(eval(if(status=="active",title,null()))) as active \
    dc(eval(if(status=="deprecated",title,null()))) as deprecated \
    dc(eval(if(status=="under_development",title,null()))) as coming_soon \
    values(eval(if(status=="active",display_name,null()))) as products \
    by category \
| sort - total

###  3. Add-on Family Summary  ###############################################
# Group products by addon_family to see install-flow groupings.
[SCAN - Product Catalog - By Add-on Family]
description = Groups products by their add-on family (e.g. security-cloud, catalyst, collaboration). Shows which products share the same Splunk add-on and helps plan consolidated installations.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| stats count as product_count \
    values(display_name) as products \
    values(addon_label) as addon_labels \
    by addon_family \
| sort - product_count

###  4. SOAR Connector Inventory  ############################################
# Products with SOAR connectors — shows connector labels and Splunkbase UIDs.
[SCAN - SOAR Connector Inventory]
description = Lists every product that has one or more Splunk SOAR connectors available, with connector names, Splunkbase IDs, and download URLs. Use this to identify SOAR automation opportunities across your Cisco estate.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(soar_connector_label) \
| eval connectors=mvappend( \
    soar_connector_label." (#".soar_connector_uid.")", \
    if(isnotnull(soar_connector_2), soar_connector_2_label." (#".soar_connector_2_uid.")", null()), \
    if(isnotnull(soar_connector_3), soar_connector_3_label." (#".soar_connector_3_uid.")", null()) \
    ) \
| eval connector_count=mvcount(connectors) \
| table display_name category connector_count connectors soar_connector_url soar_connector_2_url soar_connector_3_url \
| sort 0 - connector_count display_name

###  5. Legacy App Inventory  ################################################
# Expand every legacy app per product — useful for migration planning.
[SCAN - Legacy App Inventory]
description = Expands every legacy (deprecated/archived) add-on per product into individual rows with app IDs, labels, Splunkbase UIDs, and URLs. Essential for migration planning — identify which old TAs need to be replaced by the current add-on.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(legacy_apps) \
| eval legacy_app=split(legacy_apps,","), legacy_label=split(legacy_labels,","), legacy_uid=split(legacy_uids,","), legacy_url=split(legacy_urls,",") \
| eval rows=mvrange(0,mvcount(legacy_app)) \
| mvexpand rows \
| eval legacy_app=mvindex(legacy_app,rows), legacy_label=mvindex(legacy_label,rows), legacy_uid=mvindex(legacy_uid,rows), legacy_url=mvindex(legacy_url,rows) \
| table display_name category addon_label legacy_app legacy_label legacy_uid legacy_url \
| sort 0 display_name legacy_uid

###  6. Sourcetype Coverage  #################################################
# All sourcetypes across all products — find overlaps or gaps.
[SCAN - Sourcetype Coverage]
description = Lists every sourcetype tracked across all products and shows which products share each sourcetype. Useful for detecting overlaps (multiple products ingesting the same data) and finding gaps in sourcetype coverage.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(sourcetypes) \
| eval sourcetype=split(sourcetypes,",") \
| mvexpand sourcetype \
| eval sourcetype=trim(sourcetype) \
| stats values(display_name) as products dc(display_name) as product_count by sourcetype \
| sort 0 - product_count sourcetype

###  7. Missing Fields Audit  ################################################
# Find products with missing critical fields — data quality check.
[SCAN - Data Quality - Missing Fields Audit]
description = Identifies products with missing critical fields such as sourcetypes, descriptions, keywords, learn_more_url, addon URLs, icons, or dashboards. Run this after catalog edits to catch data quality issues before they reach customers.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval missing=mvappend( \
    if(isnull(sourcetypes),"sourcetypes",null()), \
    if(isnull(learn_more_url),"learn_more_url",null()), \
    if(isnull(keywords),"keywords",null()), \
    if(isnull(description),"description",null()), \
    if(isnull(addon_splunkbase_url),"addon_splunkbase_url",null()), \
    if(isnull(addon_install_url),"addon_install_url",null()), \
    if(isnull(icon_emoji),"icon_emoji",null()), \
    if(isnull(dashboards),"dashboards",null()) \
    ) \
| where isnotnull(missing) \
| eval missing_count=mvcount(missing) \
| table display_name category status missing_count missing \
| sort 0 - missing_count display_name

###  8. Products with Prerequisites  #########################################
# Products that require companion apps (e.g. Splunk Stream).
[SCAN - Products with Prerequisites]
description = Shows products that require companion apps (e.g. Splunk Add-on for Stream Forwarders, Splunk App for Stream) to be installed before they can ingest data. Helps admins prepare their environment before onboarding a new Cisco product.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| where isnotnull(prereq_apps) \
| table display_name category addon_label prereq_labels prereq_apps prereq_uids

###  9. Installed Apps vs Catalog  ###########################################
# Cross-reference locally installed apps against addon and legacy_apps fields.
# Shows which products have their add-on installed and which legacy TAs are
# still present — critical for migration troubleshooting.
[SCAN - Installed Apps vs Catalog]
description = Cross-references locally installed Splunk apps against the product catalog's addon and legacy_apps fields. Shows which products have their current add-on installed and flags any legacy TAs still present — critical for migration troubleshooting.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| fields title display_name category status addon addon_label legacy_apps legacy_labels \
| join type=left addon \
    [| rest splunk_server=local /services/apps/local \
     | rename title as installed_addon_name, label as installed_label \
     | eval addon=installed_addon_name \
     | fields addon installed_label \
     | dedup addon ] \
| eval addon_installed=if(isnotnull(installed_label),"YES","no") \
| eval legacy_app_list=split(legacy_apps,",") \
| eval legacy_label_list=split(legacy_labels,",") \
| eval legacy_detected=mvmap(legacy_app_list, legacy_app_list) \
| join type=left legacy_detected \
    [| rest splunk_server=local /services/apps/local \
     | rename title as legacy_detected \
     | fields legacy_detected \
     | dedup legacy_detected ] \
| table display_name category status addon_label addon_installed legacy_labels \
| sort 0 category display_name

### 10. CSV ↔ products.conf Gap Analysis  ####################################
# Cross-reference cisco_apps.csv with products.conf to find CSV rows
# that don't map to any product stanza.
[SCAN - Gap Analysis - CSV vs Catalog]
description = Cross-references the cisco_apps.csv lookup (master Splunkbase inventory) against products.conf to find CSV rows that don't map to any product stanza. Surfaces apps that may need to be added to the catalog or mapped to an existing product.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | inputlookup cisco_apps.csv \
| table Splunkbase_ID App_Name Folder_Name Developed_By Latest_Version type Cisco_App_Class Support Supported_Cisco_Products_Zipped Deprecated Replacement Archived Archive_Status Sourcetypes \
| rename Supported_Cisco_Products_Zipped as Supported_Cisco_Products \
| makemv delim=", " Supported_Cisco_Products \
| eval Supported_Cisco_Products=trim(Supported_Cisco_Products) \
| stats values(*) as * dc(Supported_Cisco_Products) as num_products by Splunkbase_ID \
| search Archived=false Deprecated=No Archive_Status != flagged NOT Replacement=* \
| stats values(*) as * by Supported_Cisco_Products \
| join Supported_Cisco_Products type=left \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-products \
    | rename eai:acl.app as app \
    | fields - eai:* id published splunk_server updated author \
    | stats count as found by display_name \
    | rename display_name as Supported_Cisco_Products ] \
| where isnull(found)

### 11. Ecosystem Summary  ###################################################
# One-row rollup of the entire catalog: total products, categories, add-on
# families, legacy apps, SOAR connectors, sourcetypes, alert actions.
[SCAN - Ecosystem Summary]
description = One-row rollup of the entire Cisco-Splunk ecosystem: total products, categories, add-on families, active/deprecated/coming-soon counts, legacy apps, sourcetypes, SOAR connectors, prerequisite apps, visualization apps, and alert actions. The executive dashboard for catalog health.
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-products \
| rename eai:acl.app as app \
| fields - eai:* id published splunk_server updated author \
| foreach * [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="", null(), <<FIELD>>) ] \
| eval legacy_count=if(isnotnull(legacy_apps),mvcount(split(legacy_apps,",")),0) \
| eval sourcetype_count=if(isnotnull(sourcetypes),mvcount(split(sourcetypes,",")),0) \
| eval has_soar=if(isnotnull(soar_connector_label),1,0) \
| eval has_prereqs=if(isnotnull(prereq_apps),1,0) \
| eval has_viz=if(isnotnull(app_viz),1,0) \
| eval has_alert=if(isnotnull(alert_action_label),1,0) \
| eval has_community=if(isnotnull(community_apps),1,0) \
| stats dc(title) as total_products \
    dc(category) as categories \
    dc(addon_family) as addon_families \
    dc(eval(if(status=="active",title,null()))) as active \
    dc(eval(if(status=="deprecated",title,null()))) as deprecated \
    dc(eval(if(status=="under_development",title,null()))) as coming_soon \
    sum(legacy_count) as total_legacy_apps \
    sum(sourcetype_count) as total_sourcetypes \
    sum(has_soar) as products_with_soar \
    sum(has_prereqs) as products_with_prereqs \
    sum(has_viz) as products_with_viz_app \
    sum(has_alert) as products_with_alert_action \
    sum(has_community) as products_with_community_alt
