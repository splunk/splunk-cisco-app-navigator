#
# Cisco Control Center - Product Catalog Configuration
#
# Each stanza [product_id] maps to one card in the Glass Pane UI.
# Fields are documented below with a complete commented-out example.
#
# keywords - Comma-separated search terms for the Universal Finder.
#
# ──────────────────────────────────────────────────────────────────────────────
# COMPLETE EXAMPLE STANZA (all available fields)
# ──────────────────────────────────────────────────────────────────────────────
#
# [product_id]
#
# ── Core identity ────────────────────────────────────────────────────────────
# disabled =                           ; set to 1 to hide this card entirely
# display_name = Cisco Widget (WGT)    ; human-readable name shown on the card
# description = A brief paragraph …   ; product description shown on hover/expand
# value_proposition = Why this exists. ; one-liner shown as subtitle on the card
# vendor = Cisco                       ; vendor name (always "Cisco" for now)
# tagline = Security App               ; short category label on the card badge
# category = security                  ; one of: security | networking | collaboration | observability
# version = 1.0.0                      ; product catalog entry version
# status = active                      ; active | archived  (under_development entries should be removed)
#
# ── Primary add-on (TA) ─────────────────────────────────────────────────────
# addon = CiscoSecurityCloud           ; Splunk app folder name of the main TA/add-on
# addon_label = Cisco Security Cloud   ; display label for the add-on
# addon_family = security-cloud        ; family grouping: security-cloud | catalyst | standalone
# addon_splunkbase_url = https://splunkbase.splunk.com/app/7404
# addon_docs_url = https://example.com/docs
# addon_troubleshoot_url =             ; optional troubleshooting guide URL
# addon_install_url = /manager/cisco-control-center-app/appsremote?…  ; Splunk Manager deep-link
#
# ── Visualization / companion app ───────────────────────────────────────────
# app_viz = cisco_widget_viz           ; folder name of a companion viz app (if any)
# app_viz_label = Cisco Widget Viz     ; display label
# app_viz_splunkbase_url =             ; Splunkbase URL
# app_viz_docs_url =                   ; documentation URL
# app_viz_troubleshoot_url =           ; troubleshooting URL
# app_viz_install_url =                ; Splunk Manager deep-link
#
# ── Second visualization app (rare) ─────────────────────────────────────────
# app_viz_2 =                          ; same fields as app_viz but for a second companion
# app_viz_2_label =
# app_viz_2_splunkbase_url =
# app_viz_2_docs_url =
# app_viz_2_troubleshoot_url =
# app_viz_2_install_url =
#
# ── External link ────────────────────────────────────────────────────────────
# learn_more_url = https://cisco.com/… ; "Learn More" button destination
#
# ── Legacy / predecessor apps ────────────────────────────────────────────────
# legacy_apps = old_app_folder,old2    ; comma-separated Splunk folder names
# legacy_labels = Old App,Old 2        ; matching display labels
# legacy_uids = 1234,5678              ; matching Splunkbase numeric IDs
# legacy_urls = https://…,https://…    ; matching Splunkbase URLs
#
# ── Prerequisite apps ───────────────────────────────────────────────────────
# prereq_apps = some_prereq            ; apps required before this product works
# prereq_labels = Some Prereq
# prereq_uids = 9999
# prereq_urls = https://…
#
# ── Community / third-party apps ────────────────────────────────────────────
# community_apps = community_ta        ; community-built apps related to this product
# community_labels = Community TA
# community_uids = 4444
# community_urls = https://…
#
# ── Data ─────────────────────────────────────────────────────────────────────
# sourcetypes = cisco:widget:event,cisco:widget:log  ; pipe-delimited in CSV, comma-delimited here
# dashboards = widget_overview         ; default dashboard XML name(s) to link
# custom_dashboard =                   ; override dashboard name if non-standard
#
# ── Search / UX ──────────────────────────────────────────────────────────────
# keywords = widget,wgt,gadget         ; comma-separated search/filter terms
# aliases =                            ; alternate product names for search
# icon_emoji = shield                  ; emoji name for the card icon (no colons)
# sort_order = 50                      ; numeric sort weight (lower = higher in list)
#
# ── Card appearance ─────────────────────────────────────────────────────────
# card_banner = Powered by Cisco Security Cloud  ; translucent watermark text
# card_banner_color = cisco            ; banner color theme
# card_banner_size = small             ; small | large
# card_banner_opacity = 0.12           ; 0–1 opacity for watermark
# card_accent = #049fd9                ; accent color (hex)
# card_bg_color = ice                  ; card background color name
# support_level = cisco_supported      ; cisco_supported | community | third_party
# is_new = true                        ; show "NEW" badge on the card (omit if not new)
# secure_networking_gtm = true         ; include in Secure Networking GTM filter
#
# ── SOAR connectors (up to 3) ───────────────────────────────────────────────
# soar_connector_label = Cisco Widget for SOAR
# soar_connector_uid = 1111
# soar_connector_url = https://splunkbase.splunk.com/app/1111
# soar_connector_2_label =
# soar_connector_2_uid =
# soar_connector_2_url =
# soar_connector_3_label =
# soar_connector_3_uid =
# soar_connector_3_url =
#
# ── Alert actions ────────────────────────────────────────────────────────────
# alert_action_label = Cisco Widget Alert Action
# alert_action_uid = 2222
# alert_action_url = https://splunkbase.splunk.com/app/2222
# alert_action_2_label =
# alert_action_2_uid =
# alert_action_2_url =
#
# ── ITSI content pack ───────────────────────────────────────────────────────
# itsi_content_pack_label = Cisco Widget ITSI Pack
# itsi_content_pack_docs_url = https://…
#
# ── SC4S (Splunk Connect for Syslog) ────────────────────────────────────────
# sc4s_url = https://splunk.github.io/splunk-connect-for-syslog/main/sources/vendor/Cisco/cisco_widget/
# sc4s_label = SC4S: Cisco Widget                ; display text for the SC4S link (defaults to "SC4S documentation")
#
# ── Custom per-product best practices ───────────────────────────────────────
# best_practices = Tip one goes here|Tip two goes here|Third tip    ; pipe-delimited custom tips shown in Best Practices modal
#
# ──────────────────────────────────────────────────────────────────────────────

